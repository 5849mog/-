  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
–bg-dark: #0a0c10;
–bg-panel: #0f1318;
–bg-panel2: #141920;
–player-color: #00aaff;
–player-dark: #004466;
–ai-color: #ff3333;
–ai-dark: #660011;
–gold-color: #f0c040;
–green: #00ff88;
–border: #1e2a3a;
–text-dim: #556677;
–text: #aabbcc;
–text-bright: #ddeeff;
}

body {
background: var(–bg-dark);
color: var(–text);
font-family: ‘Rajdhani’, sans-serif;
overflow: hidden;
height: 100vh;
width: 100vw;
}

#game-container {
display: flex;
flex-direction: column;
height: 100vh;
width: 100vw;
}

/* HUD TOP */
#hud-top {
display: flex;
justify-content: space-between;
align-items: center;
padding: 8px 16px;
background: var(–bg-panel);
border-bottom: 1px solid var(–border);
height: 56px;
flex-shrink: 0;
}

#hud-left, #hud-right {
display: flex;
gap: 16px;
}

#hud-right {
flex-direction: row-reverse;
}

.hud-block {
display: flex;
flex-direction: column;
align-items: center;
min-width: 52px;
}

.hud-label {
font-size: 10px;
color: var(–text-dim);
text-transform: uppercase;
letter-spacing: 1px;
}

.hud-value {
font-family: ‘Orbitron’, monospace;
font-size: 14px;
color: var(–text-bright);
font-weight: 700;
}

.hud-value.gold {
color: var(–gold-color);
}

#hud-center {
text-align: center;
}

#game-title {
font-family: ‘Orbitron’, monospace;
font-size: 16px;
font-weight: 900;
letter-spacing: 3px;
background: linear-gradient(90deg, var(–player-color), #ffffff, var(–ai-color));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

#wave-info {
display: flex;
gap: 20px;
justify-content: center;
font-size: 12px;
color: var(–text-dim);
margin-top: 2px;
}

#wave-info span {
display: flex;
gap: 4px;
}

/* CANVAS */
#gameCanvas {
flex: 1;
display: block;
width: 100%;
cursor: crosshair;
}

/* CONTROL PANEL */
#control-panel {
background: var(–bg-panel);
border-top: 1px solid var(–border);
padding: 8px 12px;
flex-shrink: 0;
display: flex;
gap: 12px;
align-items: center;
height: 130px;
}

#command-buttons {
display: flex;
flex-direction: column;
gap: 6px;
flex-shrink: 0;
}

.cmd-btn {
display: flex;
align-items: center;
gap: 6px;
padding: 8px 14px;
border: none;
border-radius: 4px;
cursor: pointer;
font-family: ‘Rajdhani’, sans-serif;
font-size: 13px;
font-weight: 700;
letter-spacing: 1px;
transition: all 0.15s;
width: 120px;
}

.attack-btn {
background: linear-gradient(135deg, #ff4400, #cc2200);
color: white;
border: 1px solid #ff6600;
}

.attack-btn:hover {
background: linear-gradient(135deg, #ff6600, #ff3300);
box-shadow: 0 0 12px rgba(255,80,0,0.5);
}

.recall-btn {
background: linear-gradient(135deg, #0066cc, #004499);
color: white;
border: 1px solid #0088ff;
}

.recall-btn:hover {
background: linear-gradient(135deg, #0088ff, #0055cc);
box-shadow: 0 0 12px rgba(0,136,255,0.5);
}

.btn-icon {
font-size: 16px;
}

/* UNIT PANEL */
#unit-panel {
flex: 1;
overflow: hidden;
display: flex;
flex-direction: column;
gap: 4px;
}

.panel-section-label {
font-size: 10px;
color: var(–text-dim);
text-transform: uppercase;
letter-spacing: 2px;
padding-left: 4px;
}

.units-row {
display: flex;
gap: 6px;
overflow-x: auto;
padding-bottom: 2px;
}

.units-row::-webkit-scrollbar {
height: 3px;
}
.units-row::-webkit-scrollbar-track {
background: var(–bg-dark);
}
.units-row::-webkit-scrollbar-thumb {
background: var(–border);
border-radius: 2px;
}

.unit-btn {
display: flex;
flex-direction: column;
align-items: center;
padding: 6px 8px;
background: var(–bg-panel2);
border: 1px solid var(–border);
border-radius: 6px;
cursor: pointer;
transition: all 0.15s;
min-width: 70px;
max-width: 70px;
flex-shrink: 0;
position: relative;
}

.unit-btn:hover {
border-color: var(–player-color);
background: #0a1520;
box-shadow: 0 0 8px rgba(0,170,255,0.2);
}

.unit-btn:active {
transform: scale(0.95);
}

.unit-btn.cant-afford {
opacity: 0.4;
cursor: not-allowed;
}

.unit-btn .unit-icon {
font-size: 20px;
line-height: 1;
}

.unit-btn .unit-name {
font-size: 9px;
color: var(–text);
margin-top: 2px;
text-align: center;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
width: 100%;
}

.unit-btn .unit-cost {
font-family: ‘Orbitron’, monospace;
font-size: 10px;
color: var(–gold-color);
margin-top: 1px;
}

.unit-btn.group-btn {
border-color: #335;
background: #0a0a14;
}

.unit-btn.group-btn:hover {
border-color: #aa88ff;
box-shadow: 0 0 8px rgba(160,120,255,0.3);
}

.unit-btn.group-btn .unit-cost {
color: #cc99ff;
}

/* GAME OVER */
#game-over {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
display: flex;
align-items: center;
justify-content: center;
z-index: 100;
backdrop-filter: blur(4px);
}

#game-over.hidden {
display: none;
}

#game-over-content {
background: var(–bg-panel);
border: 1px solid var(–border);
border-radius: 12px;
padding: 48px 64px;
text-align: center;
min-width: 400px;
}

#game-over-title {
font-family: ‘Orbitron’, monospace;
font-size: 32px;
font-weight: 900;
letter-spacing: 4px;
margin-bottom: 16px;
}

#game-over-result {
font-size: 22px;
font-weight: 700;
margin-bottom: 24px;
}

#game-over-stats {
color: var(–text-dim);
font-size: 15px;
line-height: 2;
margin-bottom: 32px;
}

#restart-btn {
padding: 14px 40px;
background: linear-gradient(135deg, var(–player-color), #0055aa);
border: none;
border-radius: 6px;
color: white;
font-family: ‘Orbitron’, monospace;
font-size: 14px;
font-weight: 700;
letter-spacing: 2px;
cursor: pointer;
transition: all 0.2s;
}

#restart-btn:hover {
box-shadow: 0 0 20px rgba(0,170,255,0.5);
transform: translateY(-2px);
}

/* Damage flash overlay */
#damage-flash {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 50;
opacity: 0;
transition: opacity 0.1s;
}

// Building definitions
const BUILDING_DEFS = {
  base: {
    id: 'base', name: '指挥中心',
    hp: 3000, maxHp: 3000,
    attack: 0, range: 0,
    width: 60, height: 60,

  },

// ============================================================
// MAIN GAME ENGINE
// ============================================================

class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.running = false;
    this.gameOver = false;
    this.lastTime = 0;
    this.kills = 0;
    this.startTime = 0;
    this.elapsed = 0;

    this.particles = [];
    this.projectiles = [];
    this.floatingTexts = [];

    this.player = null;
    this.ai = null;

    this.init();
    this.buildUI();
    window.addEventListener('resize', () => this.resize());
    this.resize();
  }

  resize() {
    const container = document.getElementById('game-container');
    const hud = document.getElementById('hud-top');
    const panel = document.getElementById('control-panel');
    this.canvas.width = container.clientWidth;
    this.canvas.height = container.clientHeight - hud.offsetHeight - panel.offsetHeight;
    if (this.player) this.layoutVillages();
  }

  init() {
    this.player = new Village('player', this);
    this.ai = new Village('ai', this);
    this.kills = 0;
    this.startTime = Date.now();
    this.elapsed = 0;
    this.particles = [];
    this.projectiles = [];
    this.floatingTexts = [];
    this.gameOver = false;
    document.getElementById('game-over').classList.add('hidden');
    this.layoutVillages();
    this.updateUI();
    if (!this.running) {
      this.running = true;
      requestAnimationFrame((t) => this.loop(t));
    }
  }

  layoutVillages() {
    const W = this.canvas.width;
    const H = this.canvas.height;
    const cx = H / 2;

    // Player village - left side
    this.player.x = 120;
    this.player.y = cx;
    this.player.layoutBuildings();

    // AI village - right side
    this.ai.x = W - 120;
    this.ai.y = cx;
    this.ai.layoutBuildings();
  }

  loop(timestamp) {
    if (!this.running) return;
    const dt = Math.min(timestamp - this.lastTime, 50);
    this.lastTime = timestamp;

    if (!this.gameOver) {
      this.elapsed = Date.now() - this.startTime;
      this.update(dt);
    }
    this.draw();
    requestAnimationFrame((t) => this.loop(t));
  }

  update(dt) {
    this.player.update(dt);
    this.ai.update(dt);

    // Update projectiles
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const p = this.projectiles[i];
      p.update(dt);
      if (p.dead) this.projectiles.splice(i, 1);
    }

    // Update particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life -= dt;
      p.x += p.vx * dt * 0.06;
      p.y += p.vy * dt * 0.06;
      p.vy += 0.05 * dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    // Update floating texts
    for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
      const t = this.floatingTexts[i];
      t.life -= dt;
      t.y -= 0.05 * dt;
      if (t.life <= 0) this.floatingTexts.splice(i, 1);
    }

    this.updateHUD();
    this.checkGameOver();
  }

  checkGameOver() {
    const playerBaseDead = this.player.buildings.find(b => b.type === 'base' && b.hp <= 0);
    const aiBaseDead = this.ai.buildings.find(b => b.type === 'base' && b.hp <= 0);

    if (playerBaseDead || aiBaseDead) {
      this.gameOver = true;
      const win = aiBaseDead;
      const timeStr = this.formatTime(this.elapsed);

      document.getElementById('game-over').classList.remove('hidden');
      document.getElementById('game-over-title').textContent = win ? '🏆 胜利' : '💥 战败';
      document.getElementById('game-over-title').style.color = win ? '#00ff88' : '#ff3333';
      document.getElementById('game-over-result').textContent = win ? '敌方指挥中心已被摧毁！' : '我方指挥中心已被摧毁！';
      document.getElementById('game-over-result').style.color = win ? '#00cc66' : '#cc2200';
      document.getElementById('game-over-stats').innerHTML = `
        存活时间：${timeStr}<br>
        消灭敌军：${this.kills} 人
      `;
    }
  }

  formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  draw() {
    const ctx = this.ctx;
    const W = this.canvas.width;
    const H = this.canvas.height;

    // Background
    ctx.fillStyle = '#060810';
    ctx.fillRect(0, 0, W, H);

    // Grid
    this.drawGrid(ctx, W, H);

    // Center divider
    ctx.strokeStyle = '#1a2233';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(W/2, 0);
    ctx.lineTo(W/2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Territory tint
    ctx.fillStyle = 'rgba(0,100,200,0.03)';
    ctx.fillRect(0, 0, W/2, H);
    ctx.fillStyle = 'rgba(200,30,0,0.03)';
    ctx.fillRect(W/2, 0, W/2, H);

    // Draw villages
    this.player.draw(ctx);
    this.ai.draw(ctx);

    // Draw projectiles
    for (const p of this.projectiles) p.draw(ctx);

    // Draw particles
    for (const p of this.particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Draw floating texts
    for (const t of this.floatingTexts) {
      ctx.globalAlpha = Math.max(0, t.life / t.maxLife);
      ctx.font = `bold ${t.size}px Rajdhani`;
      ctx.fillStyle = t.color;
      ctx.textAlign = 'center';
      ctx.fillText(t.text, t.x, t.y);
    }
    ctx.globalAlpha = 1;

    // Game time
    const timeStr = this.formatTime(this.elapsed);
    document.getElementById('game-time').textContent = timeStr;
    document.getElementById('kills').textContent = this.kills;
  }

  drawGrid(ctx, W, H) {
    ctx.strokeStyle = 'rgba(20,35,55,0.8)';
    ctx.lineWidth = 0.5;
    const gs = 40;
    for (let x = 0; x < W; x += gs) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += gs) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }
  }

  spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color,
        size: 1.5 + Math.random() * 2.5,
        life: 400 + Math.random() * 400,
        maxLife: 800
      });
    }
  }

  spawnFloatingText(x, y, text, color = '#ffffff', size = 14) {
    this.floatingTexts.push({ x, y, text, color, size, life: 800, maxLife: 800 });
  }

  updateHUD() {
    document.getElementById('player-gold').textContent = Math.floor(this.player.gold);
    document.getElementById('ai-gold').textContent = Math.floor(this.ai.gold);
    document.getElementById('player-garrison').textContent = this.player.units.filter(u => u.state === 'garrison').length;
    document.getElementById('player-attacking').textContent = this.player.units.filter(u => u.state === 'attack').length;
    document.getElementById('ai-garrison').textContent = this.ai.units.filter(u => u.state === 'garrison').length;
    document.getElementById('ai-attacking').textContent = this.ai.units.filter(u => u.state === 'attack').length;

    // Update button affordability
    document.querySelectorAll('.unit-btn').forEach(btn => {
      const cost = parseInt(btn.dataset.cost);
      if (this.player.gold < cost) {
        btn.classList.add('cant-afford');
      } else {
        btn.classList.remove('cant-afford');
      }
    });
  }

  updateUI() {
    // handled by updateHUD
  }

  attackAll() {
    this.player.units.forEach(u => {
      if (u.state === 'garrison') u.setState('attack');
    });
  }

  recallAll() {
    this.player.units.forEach(u => {
      if (u.state === 'attack') u.setState('recall');
    });
  }

  spawnUnit(typeId) {
    const def = UNIT_DEFS[typeId] || null;
    const groupDef = GROUP_DEFS[typeId] || null;

    if (def) {
      if (this.player.gold < def.cost) return;
      this.player.gold -= def.cost;
      this.player.spawnUnit(typeId);
    } else if (groupDef) {
      if (this.player.gold < groupDef.cost) return;
      this.player.gold -= groupDef.cost;
      for (const comp of groupDef.composition) {
        for (let i = 0; i < comp.count; i++) {
          this.player.spawnUnit(comp.type);
        }
      }
    }
  }

  buildUI() {
    const singleRow = document.getElementById('single-units');
    const groupRow = document.getElementById('group-units');

    for (const [id, def] of Object.entries(UNIT_DEFS)) {
      const btn = document.createElement('button');
      btn.className = 'unit-btn';
      btn.dataset.cost = def.cost;
      btn.innerHTML = `
        <span class="unit-icon">${def.icon}</span>
        <span class="unit-name">${def.name}</span>
        <span class="unit-cost">${def.cost}💰</span>
      `;
      btn.title = def.description;
      btn.addEventListener('click', () => this.spawnUnit(id));
      singleRow.appendChild(btn);
    }

    for (const [id, def] of Object.entries(GROUP_DEFS)) {
      const btn = document.createElement('button');
      btn.className = 'unit-btn group-btn';
      btn.dataset.cost = def.cost;
      btn.innerHTML = `
        <span class="unit-icon">${def.icon}</span>
        <span class="unit-name">${def.name}</span>
        <span class="unit-cost">${def.cost}💰</span>
      `;
      btn.title = def.description;
      btn.addEventListener('click', () => this.spawnUnit(id));
      groupRow.appendChild(btn);
    }
  }

  restart() {
    this.running = false;
    setTimeout(() => {
      this.running = true;
      this.init();
    }, 100);
  }
}

// ============================================================
// VILLAGE CLASS
// ============================================================

class Village {
  constructor(side, game) {
    this.side = side; // 'player' or 'ai'
    this.game = game;
    this.gold = 5000;
    this.goldRate = 10; // per second
    this.x = 0;
    this.y = 0;
    this.units = [];
    this.buildings = [];
    this.aiTimer = 0;
    this.aiPhase = 'build'; // build | defend | attack
    this.aiAggressionTimer = 0;
    this.difficultyScale = 1;
  }

  layoutBuildings() {
    const x = this.x;
    const y = this.y;
    this.buildings = [];

    const flip = this.side === 'ai' ? -1 : 1;

    // Base (command center)
    this.buildings.push(new Building('base', x, y, this));

    // Towers
    this.buildings.push(new Building('tower', x + flip * 50, y - 55, this));
    this.buildings.push(new Building('tower', x + flip * 50, y + 55, this));
    this.buildings.push(new Building('tower', x + flip * 80, y, this));

    // Walls
    const wallXOffset = flip * 100;
    for (let wy = -60; wy <= 60; wy += 20) {
      this.buildings.push(new Building('wall', x + wallXOffset, y + wy, this));
    }
  }

  get enemy() {
    return this.side === 'player' ? this.game.ai : this.game.player;
  }

  spawnUnit(typeId) {
    const def = UNIT_DEFS[typeId];
    if (!def) return;
    const unit = new Unit(typeId, this);
    // Spawn near base with slight scatter
    unit.x = this.x + (Math.random() - 0.5) * 60;
    unit.y = this.y + (Math.random() - 0.5) * 80;
    unit.setState('garrison');
    this.units.push(unit);
  }

  update(dt) {
    // Gold income
    this.gold += (this.goldRate * this.difficultyScale * dt) / 1000;

    // Units
    for (let i = this.units.length - 1; i >= 0; i--) {
      const u = this.units[i];
      u.update(dt);
      if (u.dead) {
        this.game.spawnParticles(u.x, u.y, u.color, 12);
        this.units.splice(i, 1);
        if (u.owner !== (this.side === 'player' ? this.game.player : this.game.ai)) {
          // Enemy unit killed
        }
      }
    }

    // Buildings
    for (const b of this.buildings) {
      b.update(dt);
    }

    // AI logic
    if (this.side === 'ai') {
      this.updateAI(dt);
    }

    // Difficulty scale over time
    this.difficultyScale = 1 + (this.game.elapsed / 120000) * 0.8;
  }

  updateAI(dt) {
    this.aiTimer += dt;
    this.aiAggressionTimer += dt;

    const elapsed = this.game.elapsed;
    const scale = this.difficultyScale;

    // Gold income scales up over time
    // (handled by difficultyScale on goldRate)

    // Spawn interval gets faster over time
    const spawnInterval = Math.max(3000, 8000 - elapsed / 5000);

    if (this.aiTimer >= spawnInterval) {
      this.aiTimer = 0;
      this.aiSpawnLogic(elapsed, scale);
    }

    // Attack decision
    const attackInterval = Math.max(12000, 30000 - elapsed / 3000);
    if (this.aiAggressionTimer >= attackInterval) {
      this.aiAggressionTimer = 0;
      this.aiAttackDecision(scale);
    }

    // Counter-attack when player attacks us hard
    const playerAttacking = this.game.player.units.filter(u => u.state === 'attack').length;
    if (playerAttacking >= 6 && Math.random() < 0.02) {
      this.aiCounterAttack(scale);
    }
  }

  aiSpawnLogic(elapsed, scale) {
    const budget = Math.min(2000, 300 * scale);
    if (this.gold < budget * 0.4) return;

    let spent = 0;
    const unitPool = this.getAIUnitPool(elapsed);

    // Shuffle and pick units to spawn within budget
    while (spent < budget && this.gold > 50) {
      const choice = unitPool[Math.floor(Math.random() * unitPool.length)];
      const def = UNIT_DEFS[choice];
      if (!def || this.gold < def.cost) break;
      this.gold -= def.cost;
      this.spawnUnit(choice);
      // New units start in garrison by default
      spent += def.cost;
    }
  }

  getAIUnitPool(elapsed) {
    const mins = elapsed / 60000;
    if (mins < 1) return ['infantry', 'infantry', 'heavy'];
    if (mins < 2) return ['infantry', 'heavy', 'sniper', 'special'];
    if (mins < 4) return ['heavy', 'sniper', 'special', 'emp', 'unitree'];
    if (mins < 6) return ['special', 'unitree', 'lightMech', 'sniper', 'nano'];
    return ['lightMech', 'heavyMech', 'unitree', 'special', 'nano', 'emp'];
  }

  aiAttackDecision(scale) {
    const garrisonCount = this.units.filter(u => u.state === 'garrison').length;
    const minToAttack = Math.max(3, Math.floor(4 / scale));

    if (garrisonCount >= minToAttack) {
      // Send 60-80% of garrison to attack, keep rest defending
      const toSend = Math.floor(garrisonCount * (0.6 + Math.random() * 0.2));
      let sent = 0;
      for (const u of this.units) {
        if (u.state === 'garrison' && sent < toSend) {
          u.setState('attack');
          sent++;
        }
      }
    }
  }

  aiCounterAttack(scale) {
    // FIERCE counter-attack: send everything
    let sent = 0;
    for (const u of this.units) {
      if (u.state === 'garrison') {
        u.setState('attack');
        sent++;
      }
    }
    if (sent > 0) {
      this.game.spawnFloatingText(
        this.x, this.y - 80,
        '⚠ 反击！',
        '#ff3333', 20
      );
    }

    // Also immediately spawn high-tier units if we have gold
    if (this.gold > 500) {
      const pool = ['lightMech', 'heavyMech', 'unitree', 'special'];
      let budget = this.gold * 0.7;
      while (budget > 100) {
        const choice = pool[Math.floor(Math.random() * pool.length)];
        const def = UNIT_DEFS[choice];
        if (!def || this.gold < def.cost) break;
        this.gold -= def.cost;
        this.spawnUnit(choice);
        const newUnit = this.units[this.units.length - 1];
        if (newUnit) newUnit.setState('attack');
        budget -= def.cost;
      }
    }
  }

  draw(ctx) {
    // Draw buildings
    for (const b of this.buildings) {
      b.draw(ctx);
    }
    // Draw units
    for (const u of this.units) {
      u.draw(ctx);
    }
  }

  getBase() {
    return this.buildings.find(b => b.type === 'base');
  }
}

// ============================================================
// BUILDING CLASS
// ============================================================

class Building {
  constructor(type, x, y, village) {
    this.type = type;
    this.x = x;
    this.y = y;
    this.village = village;
    this.side = village.side;

    const def = BUILDING_DEFS[type];
    this.hp = def.hp;
    this.maxHp = def.maxHp;
    this.attack = def.attack;
    this.range = def.range;
    this.width = def.width;
    this.height = def.height;
    this.attackSpeed = def.attackSpeed || 1500;
    this.attackTimer = 0;
    this.level = def.level || 1;
    this.dead = false;
    this.flashTimer = 0;
  }

  get enemy() {
    return this.village.enemy;
  }

  update(dt) {
    if (this.dead) return;
    this.flashTimer = Math.max(0, this.flashTimer - dt);

    if (this.type === 'tower' && this.attack > 0) {
      this.attackTimer += dt;
      if (this.attackTimer >= this.attackSpeed) {
        this.attackTimer = 0;
        this.fireAtEnemy();
      }
    }

    if (this.hp <= 0) {
      this.dead = true;
      this.village.game.spawnParticles(this.x, this.y, '#ff6600', 20);
      this.village.game.spawnFloatingText(this.x, this.y - 30, '💥 摧毁', '#ff4400', 16);
    }
  }

  fireAtEnemy() {
    const enemies = this.enemy.units.filter(u => !u.dead);
    let closest = null, minDist = this.range;

    for (const u of enemies) {
      const d = dist(this.x, this.y, u.x, u.y);
      if (d < minDist) { minDist = d; closest = u; }
    }

    if (closest) {
      const dmg = this.attack * (1 + (this.level - 1) * 0.5);
      this.village.game.projectiles.push(new Projectile(
        this.x, this.y, closest, dmg, this.side === 'player' ? '#00aaff' : '#ff3333',
        this.village.game, false
      ));
    }
  }

  takeDamage(amount) {
    this.hp = Math.max(0, this.hp - amount);
    this.flashTimer = 100;
    this.village.game.spawnFloatingText(
      this.x + (Math.random() - 0.5) * 20,
      this.y - 20,
      `-${Math.round(amount)}`,
      '#ff6666', 11
    );
  }

  draw(ctx) {
    if (this.dead) return;

    const isPlayer = this.side === 'player';
    const flash = this.flashTimer > 0;

    if (this.type === 'base') {
      // Base drawing
      const s = this.width;
      ctx.save();
      ctx.translate(this.x, this.y);

      // Glow
      const grd = ctx.createRadialGradient(0, 0, 10, 0, 0, s);
      grd.addColorStop(0, isPlayer ? 'rgba(0,150,255,0.3)' : 'rgba(255,50,50,0.3)');
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(0, 0, s, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = flash ? '#ffffff' : (isPlayer ? '#0a2a4a' : '#2a0a0a');
      ctx.strokeStyle = isPlayer ? '#00aaff' : '#ff3333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-s/2, -s/2, s, s, 6);
      ctx.fill();
      ctx.stroke();

      // Icon
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(isPlayer ? '🏛' : '🏯', 0, 0);

      // HP bar
      this.drawHPBar(ctx, 0, -s/2 - 12, s, 5);
      ctx.restore();

    } else if (this.type === 'tower') {
      ctx.save();
      ctx.translate(this.x, this.y);
      const s = this.width;

      ctx.fillStyle = flash ? '#ffffff' : (isPlayer ? '#0a1e33' : '#1e0a0a');
      ctx.strokeStyle = isPlayer ? '#0066aa' : '#aa2200';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.roundRect(-s/2, -s/2, s, s, 4);
      ctx.fill();
      ctx.stroke();

      ctx.font = '14px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🗼', 0, 0);

      this.drawHPBar(ctx, 0, -s/2 - 8, s, 4);
      ctx.restore();

    } else if (this.type === 'wall') {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.fillStyle = flash ? '#ffffff' : '#1a2a3a';
      ctx.strokeStyle = '#2a3a4a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(-this.width/2, -this.height/2, this.width, this.height, 2);
      ctx.fill();
      ctx.stroke();
      this.drawHPBar(ctx, 0, -this.height/2 - 6, this.width, 3);
      ctx.restore();
    }
  }

  drawHPBar(ctx, x, y, w, h) {
    const pct = this.hp / this.maxHp;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.roundRect(x - w/2, y, w, h, 1);
    ctx.fill();
    ctx.fillStyle = pct > 0.5 ? '#00cc44' : pct > 0.25 ? '#ffaa00' : '#ff2200';
    ctx.beginPath();
    ctx.roundRect(x - w/2, y, w * pct, h, 1);
    ctx.fill();
  }
}

// ============================================================
// UNIT CLASS
// ============================================================

class Unit {
  constructor(typeId, village) {
    this.typeId = typeId;
    const def = UNIT_DEFS[typeId];
    this.village = village;
    this.owner = village;
    this.side = village.side;
    this.name = def.name;
    this.icon = def.icon;
    this.color = def.color;
    this.maxHp = def.maxHp;
    this.hp = def.hp;
    this.attack = def.attack;
    this.range = def.range;
    this.speed = def.speed;
    this.size = def.size;
    this.splashRadius = def.splashRadius || 0;
    this.stunDuration = def.stunDuration || 0;
    this.immuneToStun = def.immuneToStun || false;
    this.priorityTarget = def.priorityTarget || null;
    this.regenRate = def.regenRate || 0;
    this.healRange = def.healRange || 0;
    this.healRate = def.healRate || 0;

    this.x = 0;
    this.y = 0;
    this.vx = 0;
    this.vy = 0;
    this.state = 'garrison'; // garrison | attack | recall | dead
    this.dead = false;
    this.target = null;
    this.attackTimer = 1000;
    this.attackSpeed = 1000;
    this.stunTimer = 0;
    this.flashTimer = 0;
    this.patrolOffset = { x: (Math.random()-0.5)*50, y: (Math.random()-0.5)*50 };
  }

  get enemy() {
    return this.village.enemy;
  }

  setState(state) {
    this.state = state;
    this.target = null;
  }

  update(dt) {
    if (this.dead) return;
    this.flashTimer = Math.max(0, this.flashTimer - dt);
    this.stunTimer = Math.max(0, this.stunTimer - dt);
    this.attackTimer += dt;

    // Regen
    if (this.regenRate > 0) {
      this.hp = Math.min(this.maxHp, this.hp + (this.regenRate * dt) / 1000);
    }

    // Medic heal
    if (this.healRate > 0) {
      const allies = this.village.units.filter(u => !u.dead && u !== this && dist(this.x, this.y, u.x, u.y) < this.healRange);
      for (const a of allies) {
        a.hp = Math.min(a.maxHp, a.hp + (this.healRate * dt) / 1000);
      }
    }

    if (this.stunTimer > 0) {
      // Stunned, can't move or attack
      return;
    }

    if (this.state === 'garrison') {
      this.updateGarrison(dt);
    } else if (this.state === 'attack') {
      this.updateAttack(dt);
    } else if (this.state === 'recall') {
      this.updateRecall(dt);
    }
  }

  updateGarrison(dt) {
    // Return to patrol position near base
    const base = this.village.getBase();
    if (!base) return;

    const homeX = base.x + this.patrolOffset.x;
    const homeY = base.y + this.patrolOffset.y;

    // Check for enemies entering village territory
    const enemyUnits = this.enemy.units.filter(u => u.state === 'attack' && !u.dead);
    let closestEnemy = null;
    let minDist = 180; // Detection range for garrison

    for (const e of enemyUnits) {
      const d = dist(this.x, this.y, e.x, e.y);
      if (d < minDist) { minDist = d; closestEnemy = e; }
    }

    if (closestEnemy) {
      // Fight back!
      this.fightTarget(closestEnemy, dt);
    } else {
      // Drift home
      this.moveToward(homeX, homeY, dt, 0.5);
    }
  }

  updateAttack(dt) {
    // Find target
    let target = null;

    if (this.priorityTarget === 'building') {
      // Target buildings first
      const aliveBuildings = this.enemy.buildings.filter(b => !b.dead && b.hp > 0);
      if (aliveBuildings.length > 0) {
        target = aliveBuildings.reduce((a, b) =>
          dist(this.x, this.y, a.x, a.y) < dist(this.x, this.y, b.x, b.y) ? a : b
        );
      }
    }

    if (!target) {
      // Target nearest enemy unit
      const enemyUnits = this.enemy.units.filter(u => !u.dead);
      if (enemyUnits.length > 0) {
        target = enemyUnits.reduce((a, b) =>
          dist(this.x, this.y, a.x, a.y) < dist(this.x, this.y, b.x, b.y) ? a : b
        );
      }
    }

    if (!target) {
      // No units, attack buildings
      const aliveBuildings = this.enemy.buildings.filter(b => !b.dead && b.hp > 0);
      if (aliveBuildings.length > 0) {
        target = aliveBuildings.reduce((a, b) =>
          dist(this.x, this.y, a.x, a.y) < dist(this.x, this.y, b.x, b.y) ? a : b
        );
      }
    }

    if (target) {
      this.fightTarget(target, dt);
    }
  }

  updateRecall(dt) {
    const base = this.village.getBase();
    if (!base) { this.setState('garrison'); return; }

    const d = dist(this.x, this.y, base.x, base.y);
    if (d < 80) {
      this.setState('garrison');
    } else {
      this.moveToward(base.x, base.y, dt, 1);
    }
  }

  fightTarget(target, dt) {
    const d = dist(this.x, this.y, target.x, target.y);
    const effectiveRange = this.range + (target.width || 0) / 2;

    if (d > effectiveRange) {
      this.moveToward(target.x, target.y, dt, 1);
    } else {
      // In range - attack
      if (this.attackTimer >= this.attackSpeed) {
        this.attackTimer = 0;
        this.fireAt(target);
      }
    }
  }

  fireAt(target) {
    if (this.attack <= 0) return;

    // Medic doesn't attack
    if (this.typeId === 'medic') return;

    const game = this.village.game;

    // EMP stun
    if (this.stunDuration > 0) {
      if (target.immuneToStun) {
        target.takeDamage(this.attack, this);
      } else {
        target.takeDamage(this.attack, this);
        if (!target.stunTimer || target.stunTimer <= 0) {
          target.stunTimer = this.stunDuration;
          game.spawnFloatingText(target.x, target.y - 20, '⚡眩晕', '#ffff00', 13);
        }
      }
      game.spawnParticles(target.x, target.y, '#ffff00', 5);
      return;
    }

    // Splash damage
    if (this.splashRadius > 0) {
      // AOE
      const allEnemies = [...this.enemy.units, ...this.enemy.buildings].filter(e => !e.dead && e.hp > 0);
      for (const e of allEnemies) {
        const d = dist(target.x, target.y, e.x, e.y);
        if (d <= this.splashRadius) {
          const falloff = 1 - d / this.splashRadius;
          e.takeDamage(this.attack * (0.4 + 0.6 * falloff), this);
        }
      }
      game.spawnParticles(target.x, target.y, '#ffaa00', 16);
      game.spawnFloatingText(target.x, target.y - 15, '💥', '#ffaa00', 18);
      return;
    }

    // Normal projectile
    game.projectiles.push(new Projectile(
      this.x, this.y, target, this.attack,
      this.color, game, true, this
    ));
  }

  moveToward(tx, ty, dt, speedMult = 1) {
    const d = dist(this.x, this.y, tx, ty);
    if (d < 2) return;
    const speed = this.speed * speedMult;
    const step = (speed * dt) / 1000;
    const ratio = Math.min(step / d, 1);
    this.x += (tx - this.x) * ratio;
    this.y += (ty - this.y) * ratio;
  }

  takeDamage(amount, attacker) {
    this.hp -= amount;
    this.flashTimer = 80;
    if (this.hp <= 0) {
      this.hp = 0;
      this.dead = true;
      if (attacker && attacker.village !== this.village) {
        if (attacker.village.side === 'player' || (attacker.village && attacker.village.side === 'player')) {
          this.village.game.kills++;
        }
      }
    }
  }

  draw(ctx) {
    if (this.dead) return;
    const isPlayer = this.side === 'player';
    const flash = this.flashTimer > 0;
    const stunned = this.stunTimer > 0;

    ctx.save();
    ctx.translate(this.x, this.y);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, this.size * 0.8, this.size * 0.8, this.size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body glow
    if (!flash) {
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
    }

    // Unit circle
    ctx.beginPath();
    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
    ctx.fillStyle = flash ? '#ffffff' : (isPlayer ? '#051525' : '#150505');
    ctx.fill();
    ctx.strokeStyle = flash ? '#ffffff' : this.color;
    ctx.lineWidth = stunned ? 2 : 1.5;
    if (stunned) ctx.strokeStyle = '#ffff00';
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Icon
    ctx.font = `${this.size * 1.2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(UNIT_DEFS[this.typeId].icon, 0, 1);

    // State indicator dot
    const dotColor = this.state === 'garrison' ? '#00ff88' : this.state === 'attack' ? '#ff4400' : '#ffff00';
    ctx.beginPath();
    ctx.arc(this.size - 2, -this.size + 2, 3, 0, Math.PI * 2);
    ctx.fillStyle = dotColor;
    ctx.fill();

    // HP bar
    const barW = this.size * 2.2;
    const pct = this.hp / this.maxHp;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.roundRect(-barW/2, -this.size - 7, barW, 3, 1);
    ctx.fill();
    ctx.fillStyle = pct > 0.5 ? '#00cc44' : pct > 0.25 ? '#ffaa00' : '#ff2200';
    ctx.beginPath();
    ctx.roundRect(-barW/2, -this.size - 7, barW * pct, 3, 1);
    ctx.fill();

    ctx.restore();
  }
}

// ============================================================
// PROJECTILE CLASS
// ============================================================

class Projectile {
  constructor(x, y, target, damage, color, game, fromUnit = false, shooter = null) {
    this.x = x;
    this.y = y;
    this.target = target;
    this.damage = damage;
    this.color = color;
    this.game = game;
    this.fromUnit = fromUnit;
    this.shooter = shooter;
    this.speed = 350;
    this.dead = false;
    this.size = fromUnit ? 3 : 5;
  }

  update(dt) {
    if (this.target.dead || this.target.hp <= 0) {
      this.dead = true;
      return;
    }

    const tx = this.target.x;
    const ty = this.target.y;
    const d = dist(this.x, this.y, tx, ty);
    const step = (this.speed * dt) / 1000;

    if (d <= step + 2) {
      // Hit!
      this.target.takeDamage(this.damage, this.shooter);
      this.game.spawnParticles(tx, ty, this.color, 5);
      this.dead = true;
    } else {
      this.x += ((tx - this.x) / d) * step;
      this.y += ((ty - this.y) / d) * step;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ============================================================
// UTILITY
// ============================================================

function dist(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  return Math.sqrt(dx * dx + dy * dy);
}
