<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>世界杯 - 台球式足球 (究极视听增强版)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0a1a0a;font-family:'Microsoft YaHei','PingFang SC',system-ui,sans-serif;overflow:hidden;height:100vh;width:100vw}
#gameCanvas{display:block;width:100%;height:100%}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s;z-index:10}
.hidden{opacity:0;pointer-events:none;z-index:-1}
h1{font-size:clamp(2.5rem,7vw,5rem);font-weight:900;text-shadow:0 0 30px rgba(0,255,100,.5),0 4px 20px rgba(0,0,0,.8);background:linear-gradient(180deg,#fff 0%,#00ff88 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px}
.subtitle{font-size:clamp(1rem,2.5vw,1.3rem);color:#7dd87d;margin:10px 0 30px;text-align:center;padding:0 20px}
.btn{background:linear-gradient(135deg,#00c853,#00e676);border:none;border-radius:16px;padding:18px 50px;font-size:1.3rem;font-weight:800;color:#000;cursor:pointer;box-shadow:0 8px 30px rgba(0,200,83,.5),inset 0 1px 0 rgba(255,255,255,.3);transition:all .15s;text-transform:uppercase;letter-spacing:1px;margin:8px}
.btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 40px rgba(0,200,83,.7)}
.btn:active{transform:translateY(0) scale(.97)}
.btn-blue{background:linear-gradient(135deg,#2979ff,#448aff);box-shadow:0 8px 30px rgba(41,121,255,.5)}
.btn-blue:hover{box-shadow:0 12px 40px rgba(41,121,255,.7)}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;width:92%;max-width:700px;max-height:45vh;overflow-y:auto;padding:15px;background:rgba(0,20,0,.6);border-radius:16px;border:1px solid rgba(0,255,100,.2)}
.team-card{background:linear-gradient(135deg,rgba(0,255,100,.1),rgba(0,255,100,.03));border:2px solid rgba(0,255,100,.2);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s}
.team-card:hover{transform:translateY(-4px);border-color:#00ff88;box-shadow:0 8px 25px rgba(0,255,100,.3)}
.team-card.selected{border-color:#ffd700;background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,215,0,.05));box-shadow:0 0 20px rgba(255,215,0,.4)}
.flag{font-size:2.2rem;margin-bottom:6px;display:block}
.team-name{font-size:.8rem;font-weight:700;color:#fff}
.vs-box{background:rgba(0,0,0,.5);padding:15px 40px;border-radius:20px;margin:15px 0;border:1px solid rgba(255,215,0,.3);font-size:1.3rem;font-weight:800}
.score-board{position:absolute;top:15px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(0,0,0,.85),rgba(0,30,0,.85));padding:10px 35px;border-radius:50px;border:2px solid rgba(0,255,100,.3);display:flex;align-items:center;gap:25px;z-index:5;backdrop-filter:blur(15px);box-shadow:0 10px 40px rgba(0,0,0,.6)}
.score-team{text-align:center;min-width:50px}
.score-flag{font-size:1.6rem}
.score-num{font-size:1.8rem;font-weight:900;color:#fff;transition:transform .3s;display:inline-block}
.score-divider{font-size:1.6rem;font-weight:800;color:#ffd700}
.turn-indicator{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:6px 25px;border-radius:20px;font-size:.9rem;font-weight:700;z-index:5;border:1px solid rgba(0,255,100,.3);color:#00ff88;animation:pulse 2s infinite; white-space:nowrap}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(0,255,100,0)}50%{box-shadow:0 0 15px rgba(0,255,100,.3)}}
.goal-text{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:clamp(4rem,12vw,8rem);font-weight:900;color:#ffd700;text-shadow:0 0 50px rgba(255,215,0,.9),0 4px 30px rgba(0,0,0,.9);z-index:30;pointer-events:none;white-space:nowrap}
.goal-anim{animation:goalPop 1.5s cubic-bezier(.68,-.55,.265,1.55) forwards}
@keyframes goalPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg)}40%{transform:translate(-50%,-50%) scale(1.3) rotate(8deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}}
.power-bar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:220px;height:14px;background:rgba(0,0,0,.6);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.2);z-index:5}
.power-fill{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#ffff00,#ff1744);transition:width .05s}
.instructions{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:8px 25px;border-radius:20px;font-size:.85rem;color:#aaa;z-index:5;border:1px solid rgba(255,255,255,.1); white-space:nowrap}
.winner-screen{text-align:center}
.winner-trophy{font-size:5rem;margin-bottom:15px}
.final-score{font-size:2.5rem;margin:15px 0 30px;color:#ffd700;font-weight:900}
.result-title{font-size:2rem;margin-bottom:10px}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="mainMenu" class="screen">
<h1>⚽ 世界杯</h1>
<p class="subtitle">台球式足球 · 战术大师AI · 视听进化版</p>
<button class="btn" onclick="showTeamSelect()">选择队伍开始</button>
<p style="margin-top:25px;color:#4a8a4a;font-size:.8rem;line-height:1.6;text-align:center;">
    纯享版动态光影与碰撞火花特效！<br>
    <span style="color:#ffd700">🔥新特性：异步无卡顿寻路、原生合成音效引擎</span>
</p>
</div>

<div id="teamSelect" class="screen hidden">
<h1>选择国家队</h1>
<p class="subtitle">你的队伍将在左侧进攻右侧球门</p>
<div class="teams-grid" id="teamsGrid"></div>
<div class="vs-box hidden" id="vsBox"></div>
<button class="btn hidden" id="startBtn" onclick="startGame()">开始比赛</button>
<button class="btn btn-blue" onclick="showScreen('mainMenu')">返回</button>
</div>

<div id="gameScreen" class="screen hidden" style="background:transparent;pointer-events:none">
<div class="score-board" style="pointer-events:auto">
<div class="score-team"><div class="score-flag" id="p1Flag">🏳️</div><div class="score-num" id="p1Score">0</div></div>
<div class="score-divider">:</div>
<div class="score-team"><div class="score-flag" id="p2Flag">🏳️</div><div class="score-num" id="p2Score">0</div></div>
</div>
<div class="turn-indicator" id="turnIndicator">你的回合</div>
<div class="power-bar"><div class="power-fill" id="powerFill"></div></div>
<div class="instructions" id="instr">拖拽蓄力射门，或选中球员后<b>点击空地</b>智能瞄准</div>
</div>

<div id="goalText" class="goal-text">GOAL!!!</div>

<div id="resultScreen" class="screen hidden winner-screen">
<div class="winner-trophy" id="resEmoji">🏆</div>
<div class="result-title" id="resTitle">胜利！</div>
<div class="final-score" id="resScore">3 - 1</div>
<button class="btn" onclick="restartGame()">再战一场</button>
<button class="btn btn-blue" onclick="showScreen('mainMenu')">主菜单</button>
</div>

<script>
// ===== 音效合成引擎 (纯代码，零资源加载) =====
const AudioEngine = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    play(type, intensity = 1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;
        if (type === 'kick') { // 踢球声
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gain.gain.setValueAtTime(0.5 * intensity, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now); osc.stop(now + 0.15);
        } else if (type === 'hit') { // 撞击声（球碰球/碰墙）
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
            gain.gain.setValueAtTime(0.3 * intensity, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'goal') { // 进球欢呼哨声
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(1200, now + 0.3);
            osc.frequency.linearRampToValueAtTime(800, now + 0.6);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.5, now + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            osc.start(now); osc.stop(now + 1.5);
            
            // 加入人群白噪声
            const noise = this.ctx.createBufferSource();
            const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<data.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const noiseFilter = this.ctx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 1000;
            const noiseGain = this.ctx.createGain();
            noiseGain.gain.setValueAtTime(0, now);
            noiseGain.gain.linearRampToValueAtTime(0.4, now + 0.5);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 2);
            noise.connect(noiseFilter).connect(noiseGain).connect(this.ctx.destination);
            noise.start(now); noise.stop(now + 2);
        } else if (type === 'error') { // 报错声
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(150, now + 0.2);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }
};

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H;

// ===== 游戏状态 =====
let gameState='menu';
let selectedTeam=null, opponentTeam=null;
let scores=[0,0];
let currentTurn=0;
let particles=[];
let sparks=[]; // 新增火花数组
let cameraShake=0;
let flashAlpha=0;
let timeScale=1.0; // 全局时间缩放（用于慢动作特效）

// ===== 物理常数 =====
const FRICTION=0.985;
const WALL_BOUNCE=0.7;
const PLAYER_MASS=2;
const BALL_MASS=0.5;
const RESTITUTION=0.85;
const MAX_POWER=24;
const MIN_VELOCITY=0.15;
const GOAL_WIDTH=140;
const GOAL_DEPTH=25;

// ===== 场地与实体 =====
let field={x:0,y:0,w:0,h:0,margin:0};
let ball=null;
let players=[];
let walls=[];

// ===== 瞄准与寻路 =====
let aimPlayer=null;
let aimMouseX=0, aimMouseY=0;
let isAiming=false;
let shotFired=false;
let selectedPlayer = null;
let autoAimTarget = null;
let autoAimResult = null;
let lastTapTime = 0;
let lastTapPos = {x:0, y:0};
let isCalculatingAutoAim = false;
let aiAim=null;

const teams=[
{name:'巴西',flag:'🇧🇷',color:'#ffd700',sec:'#009c3b'},{name:'阿根廷',flag:'🇦🇷',color:'#6cb4ee',sec:'#fff'},
{name:'法国',flag:'🇫🇷',color:'#0055a4',sec:'#ef4135'},{name:'德国',flag:'🇩🇪',color:'#ffce00',sec:'#000'},
{name:'西班牙',flag:'🇪🇸',color:'#aa151b',sec:'#f1bf00'},{name:'英格兰',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',color:'#fff',sec:'#cf081f'},
{name:'葡萄牙',flag:'🇵🇹',color:'#006600',sec:'#ff0000'},{name:'荷兰',flag:'🇳🇱',color:'#ff4f00',sec:'#fff'},
{name:'意大利',flag:'🇮🇹',color:'#009246',sec:'#fff'},{name:'日本',flag:'🇯🇵',color:'#bc002d',sec:'#fff'}
];

function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    initField();
}
window.addEventListener('resize',resize);

function initField(){
    const m=Math.min(W,H)*0.06;
    field={x:m,y:m*1.5,w:W-m*2,h:H-m*3,margin:m};
    walls=[
        {x:field.x,y:field.y,w:field.w,h:10},
        {x:field.x,y:field.y+field.h-10,w:field.w,h:10},
        {x:field.x,y:field.y,w:10,h:(field.h-GOAL_WIDTH)/2},
        {x:field.x,y:field.y+(field.h+GOAL_WIDTH)/2,w:10,h:(field.h-GOAL_WIDTH)/2},
        {x:field.x+field.w-10,y:field.y,w:10,h:(field.h-GOAL_WIDTH)/2},
        {x:field.x+field.w-10,y:field.y+(field.h+GOAL_WIDTH)/2,w:10,h:(field.h-GOAL_WIDTH)/2}
    ];
}

function initPlayers(){
    players=[];
    const cx=field.x+field.w/2, cy=field.y+field.h/2;
    const pr=16;

    // 添加位置与质量差异，前锋(9,10号)小而轻，后卫(7,8号)大而重
    const createTeam = (teamId, color, sec, isRight) => {
        const dir = isRight ? 1 : -1;
        const offX = isRight ? field.x+field.w : field.x;
        
        // 门将
        players.push({x:offX - dir*50, y:cy, vx:0, vy:0, r:pr+4, mass:PLAYER_MASS*1.5, team:teamId, number:1, color, sec, isKeeper:true});
        // 后卫
        players.push({x:cx - dir*120, y:cy-60, vx:0, vy:0, r:pr+1, mass:PLAYER_MASS*1.1, team:teamId, number:7, color, sec});
        players.push({x:cx - dir*120, y:cy+60, vx:0, vy:0, r:pr+1, mass:PLAYER_MASS*1.1, team:teamId, number:8, color, sec});
        // 前锋 (更小，更容易穿插打出诡异角度)
        players.push({x:cx - dir*40, y:cy-40, vx:0, vy:0, r:pr-1.5, mass:PLAYER_MASS*0.8, team:teamId, number:9, color, sec});
        players.push({x:cx - dir*40, y:cy+40, vx:0, vy:0, r:pr-1.5, mass:PLAYER_MASS*0.8, team:teamId, number:10, color, sec});
    };

    createTeam(0, selectedTeam.color, selectedTeam.sec, false);
    createTeam(1, opponentTeam.color, opponentTeam.sec, true);
}

function resetBall(){
    ball={x:field.x+field.w/2, y:field.y+field.h/2, vx:0, vy:0, r:11, mass:BALL_MASS, trail:[]};
}

// ===== UI =====
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function showTeamSelect(){
    AudioEngine.init();
    showScreen('teamSelect');
    const grid=document.getElementById('teamsGrid');
    grid.innerHTML='';
    teams.forEach((t,i)=>{
        const card=document.createElement('div');
        card.className='team-card';
        card.innerHTML=`<span class="flag">${t.flag}</span><div class="team-name">${t.name}</div>`;
        card.onclick=()=>selectTeam(i,card);
        grid.appendChild(card);
    });
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('vsBox').classList.add('hidden');
    selectedTeam=null;
}

function selectTeam(idx,card){
    AudioEngine.play('hit', 0.2);
    document.querySelectorAll('.team-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    selectedTeam=teams[idx];
    let opp;
    do{opp=teams[Math.floor(Math.random()*teams.length)]}while(opp===selectedTeam);
    opponentTeam=opp;
    document.getElementById('vsBox').innerHTML=`${selectedTeam.flag} <b>${selectedTeam.name}</b> <span style="color:#ffd700">VS</span> <b>${opponentTeam.name}</b> ${opponentTeam.flag}`;
    document.getElementById('vsBox').classList.remove('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
}

function startGame(){
    AudioEngine.init(); // 确保用户交互解锁音频
    showScreen('gameScreen');
    gameState='playing';
    scores=[0,0];
    currentTurn=0;
    shotFired=false;
    particles=[]; sparks=[];
    aimPlayer=null;isAiming=false;
    selectedPlayer=null;autoAimTarget=null;autoAimResult=null;isCalculatingAutoAim=false;
    aiAim=null;flashAlpha=0; timeScale=1.0;
    document.getElementById('p1Flag').textContent=selectedTeam.flag;
    document.getElementById('p2Flag').textContent=opponentTeam.flag;
    document.getElementById('p1Score').textContent='0';
    document.getElementById('p2Score').textContent='0';
    initField(); initPlayers(); resetBall(); updateTurnUI();
}

function updateTurnUI(){
    const ind=document.getElementById('turnIndicator');
    if(currentTurn===0){
        ind.textContent='你的回合 - 点击球员开始瞄准';
        ind.style.color='#00ff88';
        ind.style.borderColor='rgba(0,255,100,.3)';
        document.getElementById('instr').style.display='block';
        document.getElementById('powerFill').parentElement.style.display='block';
    }else{
        ind.textContent='地狱AI 正在解算最优战术路径...';
        ind.style.color='#ff6b6b';
        ind.style.borderColor='rgba(255,100,100,.3)';
        document.getElementById('instr').style.display='none';
        document.getElementById('powerFill').parentElement.style.display='none';
    }
}

// ===== 物理特效生成 =====
function spawnSparks(x, y, nx, ny, intensity) {
    const count = Math.min(15, Math.floor(intensity * 3));
    for (let i = 0; i < count; i++) {
        const spread = (Math.random() - 0.5) * 1.5;
        const speed = intensity * (0.5 + Math.random() * 0.8);
        sparks.push({
            x, y,
            vx: (nx + spread) * speed,
            vy: (ny + spread) * speed,
            life: 20 + Math.random() * 20,
            color: Math.random() > 0.5 ? '#ffd700' : '#ffaa00'
        });
    }
}

// ===== 物理引擎 =====
function isAnythingMoving(){
    const t=MIN_VELOCITY;
    for(let e of[ball,...players]){if(Math.abs(e.vx)>t||Math.abs(e.vy)>t)return true;}
    return false;
}

function updatePhysics(){
    if(gameState!=='playing')return false;
    let moving=false;

    // 记录拖尾
    if (Math.hypot(ball.vx, ball.vy) > 1) {
        ball.trail.push({x: ball.x, y: ball.y});
        if (ball.trail.length > 15) ball.trail.shift();
    } else if (ball.trail.length > 0) {
        ball.trail.shift();
    }

    [ball,...players].forEach(e=>{
        e.x += e.vx * timeScale; 
        e.y += e.vy * timeScale;
        e.vx *= FRICTION; e.vy *= FRICTION;
        if(Math.abs(e.vx)<MIN_VELOCITY)e.vx=0;
        if(Math.abs(e.vy)<MIN_VELOCITY)e.vy=0;
        if(e.vx!==0||e.vy!==0)moving=true;
    });

    // 动态时间慢动作恢复
    if (timeScale < 1.0) timeScale += 0.02;
    if (timeScale > 1.0) timeScale = 1.0;

    const goalY1=field.y+(field.h-GOAL_WIDTH)/2;
    const goalY2=field.y+(field.h+GOAL_WIDTH)/2;

    const handleWallHit = (e, isBall) => {
        let hit = false;
        if(e.x-e.r<field.x){
            if(isBall&&e.y>goalY1&&e.y<goalY2){ /* Goal logic handled elsewhere */ }
            else{e.vx*=-WALL_BOUNCE; e.x=field.x+e.r; hit=true;}
        }
        if(e.x+e.r>field.x+field.w){
            if(isBall&&e.y>goalY1&&e.y<goalY2){ }
            else{e.vx*=-WALL_BOUNCE; e.x=field.x+field.w-e.r; hit=true;}
        }
        if(e.y-e.r<field.y){e.vy*=-WALL_BOUNCE; e.y=field.y+e.r; hit=true;}
        if(e.y+e.r>field.y+field.h){e.vy*=-WALL_BOUNCE; e.y=field.y+field.h-e.r; hit=true;}
        
        if (hit && isBall && Math.hypot(e.vx, e.vy) > 2) {
            AudioEngine.play('hit', Math.min(1, Math.hypot(e.vx, e.vy)/10));
            cameraShake = Math.hypot(e.vx, e.vy) * 0.5;
        }
    };

    handleWallHit(ball, true);
    players.forEach(p => handleWallHit(p, false));

    const resolveCollision = (a, b, isBallCol) => {
        const dx=a.x-b.x, dy=a.y-b.y;
        const distSq = dx*dx + dy*dy;
        const minDist = a.r + b.r;
        if(distSq < minDist*minDist && distSq > 0){
            const dist = Math.sqrt(distSq);
            const nx=dx/dist, ny=dy/dist;
            const overlap=minDist-dist;
            a.x+=nx*overlap*0.5; a.y+=ny*overlap*0.5;
            b.x-=nx*overlap*0.5; b.y-=ny*overlap*0.5;
            const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
            const dvn=dvx*nx+dvy*ny;
            if(dvn<0){
                const impulse=2*dvn/(a.mass+b.mass)*RESTITUTION;
                a.vx-=impulse*b.mass*nx; a.vy-=impulse*b.mass*ny;
                b.vx+=impulse*a.mass*nx; b.vy+=impulse*a.mass*ny;
                
                // 碰撞特效与音效
                if (Math.abs(impulse) > 2) {
                    AudioEngine.play('hit', Math.min(1, Math.abs(impulse)/8));
                    spawnSparks(a.x - nx*a.r, a.y - ny*a.r, nx, ny, Math.abs(impulse));
                    if (Math.abs(impulse) > 8 && isBallCol) {
                        timeScale = 0.3; // 暴力射门命中顿帧感
                        cameraShake = Math.abs(impulse);
                    }
                }
            }
        }
    };

    players.forEach(p => resolveCollision(ball, p, true));
    for(let i=0;i<players.length;i++){
        for(let j=i+1;j<players.length;j++){
            resolveCollision(players[i], players[j], false);
        }
    }

    return moving;
}

// ===== 进球检测 =====
function checkGoal(){
    if(gameState!=='playing')return;
    const goalY1=field.y+(field.h-GOAL_WIDTH)/2;
    const goalY2=field.y+(field.h+GOAL_WIDTH)/2;
    if(ball.x<field.x-10&&ball.y>goalY1&&ball.y<goalY2){triggerGoal(1);return}
    if(ball.x>field.x+field.w+10&&ball.y>goalY1&&ball.y<goalY2){triggerGoal(0);return}
}

function triggerGoal(scoringTeam){
    gameState='goalAnimating';
    AudioEngine.play('goal'); // 吹哨+欢呼
    scores[scoringTeam]++;
    const el=scoringTeam===0?document.getElementById('p1Score'):document.getElementById('p2Score');
    el.textContent=scores[scoringTeam];
    el.style.transform='scale(1.6)';
    setTimeout(()=>el.style.transform='scale(1)',300);
    cameraShake=35;
    flashAlpha=0.8;
    timeScale=0.1; // 进球瞬间慢镜头死角

    const gt=document.getElementById('goalText');
    gt.classList.remove('goal-anim');void gt.offsetWidth;gt.classList.add('goal-anim');

    const gx=scoringTeam===0?field.x+field.w:field.x;
    const gy=field.y+field.h/2;
    const colors=scoringTeam===0?['#00ff88','#fff','#ffd700','#00c853']:['#ff1744','#fff','#ffd700','#ff6b6b'];
    for(let i=0;i<150;i++){
        const angle=(Math.PI*2/150)*i+Math.random()*0.4;
        const speed=3+Math.random()*15;
        particles.push({x:gx,y:gy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:140+Math.random()*60,color:colors[Math.floor(Math.random()*colors.length)],size:3+Math.random()*8,gravity:0.08,drag:0.97});
    }

    setTimeout(()=>{processGoalReset(scoringTeam);}, 2500);
}

function processGoalReset(lastScorer){
    [ball,...players].forEach(e=>{e.vx=0;e.vy=0});
    particles=[]; sparks=[]; ball.trail=[];
    timeScale=1.0;
    document.getElementById('goalText').classList.remove('goal-anim');

    if(scores[lastScorer]>=3){
        endGame(lastScorer);
        return;
    }

    initField(); initPlayers(); resetBall();
    aimPlayer=null; isAiming=false; shotFired=false; aiAim=null;
    selectedPlayer=null; autoAimTarget=null; autoAimResult=null; isCalculatingAutoAim=false;

    const loser=lastScorer===0?1:0;
    currentTurn=loser;
    gameState='playing';
    updateTurnUI();

    if(currentTurn===1) setTimeout(runAI,800);
}

// ===== 异步时间分片 智能寻路 =====
function fireAutoAim() {
    if (!autoAimResult || !selectedPlayer) return;
    AudioEngine.play('kick', 1);
    selectedPlayer.vx = Math.cos(autoAimResult.angle) * autoAimResult.power;
    selectedPlayer.vy = Math.sin(autoAimResult.angle) * autoAimResult.power;
    shotFired = true;

    isAiming = false; aimPlayer = null; selectedPlayer = null;
    autoAimTarget = null; autoAimResult = null;
    document.getElementById('powerFill').style.width='0%';
    document.getElementById('turnIndicator').textContent='射门！';
    document.getElementById('turnIndicator').style.color='#fff';
}

// 使用 async 搭配 requestAnimationFrame 实现时间分片，绝不卡顿UI
async function calculateAutoAim(player, target) {
    isCalculatingAutoAim = true;
    document.getElementById('turnIndicator').textContent='智能解析网格映射中...';
    document.getElementById('turnIndicator').style.color='#00c853';

    let bestResult = null;
    let bestDist = Infinity;
    const isGoalTarget = (target.x < field.x || target.x > field.x + field.w) && 
                         (target.y > field.y + (field.h - GOAL_WIDTH) / 2 && target.y < field.y + (field.h + GOAL_WIDTH) / 2);

    // 粗筛分片
    for (let angleDeg = 0; angleDeg < 360; angleDeg += 2) {
        const angle = angleDeg * Math.PI / 180;
        for (let power = 2; power <= MAX_POWER; power += 1.5) {
            const result = simulateShotForAutoAim(player, angle, power, target, isGoalTarget);
            if (result.dist < bestDist) {
                bestDist = result.dist;
                bestResult = { angle, power };
            }
        }
        // 每计算 10度 让出一次主线程，保持画面流程（60FPS）
        if (angleDeg % 10 === 0) await new Promise(r => requestAnimationFrame(r));
        if (!isCalculatingAutoAim) return; // 如果中途被取消
    }

    // 精细微调分片
    if (bestDist < 80 && bestResult) { 
        let fineBest = bestResult;
        let fineDist = bestDist;
        for (let aOffset = -3; aOffset <= 3; aOffset += 0.2) {
            const a = bestResult.angle + aOffset * Math.PI / 180;
            for (let pOffset = -2; pOffset <= 2; pOffset += 0.2) {
                const p = Math.min(MAX_POWER, Math.max(1, bestResult.power + pOffset));
                const res = simulateShotForAutoAim(player, a, p, target, isGoalTarget);
                if (res.dist < fineDist) {
                    fineDist = res.dist;
                    fineBest = { angle: a, power: p };
                }
            }
            await new Promise(r => requestAnimationFrame(r));
            if (!isCalculatingAutoAim) return;
        }
        
        if (fineDist < 20) {
            AudioEngine.play('hit', 0.5); // 叮！找到路线提示音
            autoAimResult = fineBest;
            autoAimResult.pathData = getTrajectory(player, fineBest.angle, fineBest.power);
            document.getElementById('turnIndicator').textContent='已解算，双击落点确认处决';
            document.getElementById('turnIndicator').style.color='#ffd700';
            isCalculatingAutoAim = false;
            return;
        }
    }
    
    // 无解
    AudioEngine.play('error');
    autoAimResult = null;
    document.getElementById('turnIndicator').textContent='战术受阻，无法到达该落点';
    document.getElementById('turnIndicator').style.color='#ff1744';
    isCalculatingAutoAim = false;
    
    setTimeout(() => {
        if (selectedPlayer && !autoAimResult && !shotFired && currentTurn === 0) {
            document.getElementById('turnIndicator').textContent='向后拉蓄力 · 或点击空地重新寻路';
            document.getElementById('turnIndicator').style.color='#00ff88';
        }
    }, 2000);
}

// 快速专用的静默模拟函数，核心逻辑一致
function simulateShotForAutoAim(player, angle, power, target, isGoalTarget) {
    let spx = player.x, spy = player.y;
    let spvx = Math.cos(angle)*power, spvy = Math.sin(angle)*power;
    const spr = player.r, spmass = player.mass;

    let sbx = ball.x, sby = ball.y;
    let sbvx = ball.vx, sbvy = ball.vy;
    const sbr = ball.r, sbmass = ball.mass;

    let hitBall = false;
    let minDistToTarget = Infinity;

    const goalY1 = field.y + (field.h - GOAL_WIDTH) / 2;
    const goalY2 = field.y + (field.h + GOAL_WIDTH) / 2;

    for(let step = 0; step < 200; step++) {
        spx += spvx; spy += spvy; sbx += sbvx; sby += sbvy;
        spvx *= FRICTION; spvy *= FRICTION; sbvx *= FRICTION; sbvy *= FRICTION;

        if(spx - spr < field.x){ spx = field.x + spr; spvx *= -WALL_BOUNCE; }
        if(spx + spr > field.x + field.w){ spx = field.x + field.w - spr; spvx *= -WALL_BOUNCE; }
        if(spy - spr < field.y){ spy = field.y + spr; spvy *= -WALL_BOUNCE; }
        if(spy + spr > field.y + field.h){ spy = field.y + field.h - spr; spvy *= -WALL_BOUNCE; }

        if(sbx - sbr < field.x){
            if(!(sby > goalY1 && sby < goalY2)) { sbvx *= -WALL_BOUNCE; sbx = field.x + sbr; }
        }
        if(sbx + sbr > field.x + field.w){
            if(!(sby > goalY1 && sby < goalY2)) { sbvx *= -WALL_BOUNCE; sbx = field.x + field.w - sbr; }
        }
        if(sby - sbr < field.y){ sbvy *= -WALL_BOUNCE; sby = field.y + sbr; }
        if(sby + sbr > field.y + field.h){ sbvy *= -WALL_BOUNCE; sby = field.y + field.h - sbr; }

        const dx = sbx - spx, dy = sby - spy;
        const distSq = dx*dx + dy*dy;
        const minDist = sbr + spr;
        if(distSq < minDist*minDist && distSq > 0.0001){
            hitBall = true;
            const dist = Math.sqrt(distSq);
            const nx = dx / dist, ny = dy / dist;
            const overlap = minDist - dist;
            sbx += nx * overlap * 0.5; sby += ny * overlap * 0.5;
            spx -= nx * overlap * 0.5; spy -= ny * overlap * 0.5;
            const dvx = sbvx - spvx, dvy = sbvy - spvy;
            const dvn = dvx * nx + dvy * ny;
            if(dvn < 0){
                const impulse = 2 * dvn / (sbmass + spmass) * RESTITUTION;
                sbvx -= impulse * spmass * nx; sbvy -= impulse * spmass * ny;
                spvx += impulse * sbmass * nx; spvy += impulse * sbmass * ny;
            }
        }

        for(let i=0; i<players.length; i++){
            const p = players[i];
            if(p === player) continue;
            
            let pdx = spx - p.x, pdy = spy - p.y;
            let pdistSq = pdx*pdx + pdy*pdy;
            let pmDist = spr + p.r;
            if(pdistSq < pmDist*pmDist && pdistSq > 0.0001){
                const pd = Math.sqrt(pdistSq);
                const pnx = pdx / pd, pny = pdy / pd;
                spx -= pnx * (pmDist - pd) * 0.5; spy -= pny * (pmDist - pd) * 0.5;
                const p_dvn = spvx * pnx + spvy * pny;
                if(p_dvn < 0) {
                    const impulse = 2 * p_dvn / (spmass + p.mass) * RESTITUTION;
                    spvx -= impulse * p.mass * pnx; spvy -= impulse * p.mass * pny;
                }
            }

            pdx = sbx - p.x; pdy = sby - p.y;
            pdistSq = pdx*pdx + pdy*pdy;
            pmDist = sbr + p.r;
            if(pdistSq < pmDist*pmDist && pdistSq > 0.0001){
                const pd = Math.sqrt(pdistSq);
                const pnx = pdx / pd, pny = pdy / pd;
                sbx -= pnx * (pmDist - pd) * 0.5; sby -= pny * (pmDist - pd) * 0.5;
                const p_dvn = sbvx * pnx + sbvy * pny;
                if(p_dvn < 0) {
                    const impulse = 2 * p_dvn / (sbmass + p.mass) * RESTITUTION;
                    sbvx -= impulse * p.mass * pnx; sbvy -= impulse * p.mass * pny;
                }
            }
        }
        
        if (hitBall && isGoalTarget) {
            const d = Math.sqrt((sbx - target.x)**2 + (sby - target.y)**2);
            if (d < minDistToTarget) minDistToTarget = d;
        }

        if(Math.abs(spvx) < 0.15 && Math.abs(spvy) < 0.15 && Math.abs(sbvx) < 0.15 && Math.abs(sbvy) < 0.15) break;
    }

    if (!hitBall) return { dist: Infinity, hitBall: false };
    let finalDist = Math.sqrt((sbx - target.x)**2 + (sby - target.y)**2);
    return { dist: isGoalTarget ? Math.min(minDistToTarget, finalDist) : finalDist, hitBall: true };
}

// ===== 地狱 AI (此处简化调用，与之前的寻路一致) =====
function runAI(){
    if(gameState!=='playing'||currentTurn!==1)return;
    const aiPlayers=players.filter(p=>p.team===1);
    aiPlayers.sort((a,b)=>{
        if(a.isKeeper) return 1; if(b.isKeeper) return -1;
        return ((a.x-ball.x)**2+(a.y-ball.y)**2) - ((b.x-ball.x)**2+(b.y-ball.y)**2);
    });

    const candidates=aiPlayers.slice(0,4); 
    let bestShot=null, bestScore=-Infinity;
    const pKeeper = players.find(p => p.team === 0 && p.isKeeper);

    // AI 计算由于本身要尽量“思考”，可以用分片，这里直接用简单超时处理即可
    setTimeout(() => {
        candidates.forEach(player=>{
            const distToBall=Math.sqrt((player.x-ball.x)**2+(player.y-ball.y)**2);
            const angleToBall=Math.atan2(ball.y-player.y,ball.x-player.x);
            const aStep = distToBall < 120 ? 1.5 : 2.5; 
            const pStep = 1.5;
            const range = distToBall < 100 ? 50 : 70; 

            for(let off=-range; off<=range; off+=aStep){
                const angle=angleToBall+off*Math.PI/180;
                for(let pow=3; pow<=MAX_POWER; pow+=pStep){
                    const sc=simulateAI(player, angle, pow, pKeeper);
                    if(sc>bestScore){ bestScore=sc; bestShot={player, angle, power:pow}; }
                }
            }
        });

        if(bestShot){
            aiAim={player:bestShot.player, angle:bestShot.angle, power:bestShot.power};
            setTimeout(()=>{
                if(gameState!=='playing'||currentTurn!==1)return;
                aiAim=null;
                AudioEngine.play('kick');
                bestShot.player.vx=Math.cos(bestShot.angle)*bestShot.power;
                bestShot.player.vy=Math.sin(bestShot.angle)*bestShot.power;
                shotFired=true;
            }, 600);
        }
    }, 100);
}

function simulateAI(player, angle, power, enemyKeeper){
    // ... [AI评分系统代码保留原有逻辑，仅作格式整理] ...
    const sp={x:player.x, y:player.y, vx:Math.cos(angle)*power, vy:Math.sin(angle)*power, r:player.r, mass:player.mass};
    const sb={x:ball.x, y:ball.y, vx:ball.vx, vy:ball.vy, r:ball.r, mass:ball.mass};
    let hitBall=false, goalScored=false, ownGoal=false;
    const goalY1=field.y+(field.h-GOAL_WIDTH)/2, goalY2=field.y+(field.h+GOAL_WIDTH)/2;
    const oppGoalX=field.x, myGoalX=field.x+field.w;
    let ballBlockedByKeeper = false;

    for(let step=0; step<130; step++){ 
        sp.x+=sp.vx; sp.y+=sp.vy; sb.x+=sb.vx; sb.y+=sb.vy;
        sp.vx*=FRICTION; sp.vy*=FRICTION; sb.vx*=FRICTION; sb.vy*=FRICTION;

        if(sp.x-sp.r<field.x){sp.x=field.x+sp.r; sp.vx*=-WALL_BOUNCE}
        if(sp.x+sp.r>field.x+field.w){sp.x=field.x+field.w-sp.r; sp.vx*=-WALL_BOUNCE}
        if(sp.y-sp.r<field.y){sp.y=field.y+sp.r; sp.vy*=-WALL_BOUNCE}
        if(sp.y+sp.r>field.y+field.h){sp.y=field.y+field.h-sp.r; sp.vy*=-WALL_BOUNCE}

        if(sb.x-sb.r<field.x){
            if(sb.y>goalY1&&sb.y<goalY2){if(sb.x<field.x-8){goalScored=true; break}}
            else{sb.vx*=-WALL_BOUNCE; sb.x=field.x+sb.r}
        }
        if(sb.x+sb.r>field.x+field.w){
            if(sb.y>goalY1&&sb.y<goalY2){if(sb.x>field.x+field.w+8){ownGoal=true; break}}
            else{sb.vx*=-WALL_BOUNCE; sb.x=field.x+field.w-sb.r}
        }
        if(sb.y-sb.r<field.y){sb.vy*=-WALL_BOUNCE; sb.y=field.y+ball.r}
        if(sb.y+sb.r>field.y+field.h){sb.vy*=-WALL_BOUNCE; sb.y=field.y+field.h-ball.r}

        if(enemyKeeper && !ballBlockedByKeeper){
            const kdx = sb.x - enemyKeeper.x, kdy = sb.y - enemyKeeper.y;
            if(kdx*kdx + kdy*kdy < (sb.r + enemyKeeper.r + 5)**2) ballBlockedByKeeper = true;
        }

        const dx=sb.x-sp.x, dy=sb.y-sp.y;
        const distSq = dx*dx+dy*dy;
        const minDist=sb.r+sp.r;
        if(distSq<minDist*minDist&&distSq>0.01){
            hitBall=true;
            const dist=Math.sqrt(distSq);
            const nx=dx/dist, ny=dy/dist;
            const overlap=minDist-dist;
            sb.x+=nx*overlap*0.5; sb.y+=ny*overlap*0.5;
            sp.x-=nx*overlap*0.5; sp.y-=ny*overlap*0.5;
            const dvx=sb.vx-sp.vx, dvy=sb.vy-sp.vy;
            const dvn=dvx*nx+dvy*ny;
            if(dvn<0){
                const impulse=2*dvn/(sb.mass+sp.mass)*RESTITUTION;
                sb.vx-=impulse*sp.mass*nx; sb.vy-=impulse*sp.mass*ny;
                sp.vx+=impulse*sb.mass*nx; sp.vy+=impulse*sb.mass*ny;
            }
        }

        for(let p of players){
            if(p===player) continue;
            const pdx=sp.x-p.x, pdy=sp.y-p.y;
            const pdSq=pdx*pdx+pdy*pdy;
            if(pdSq<(sp.r+p.r)**2&&pdSq>0){
                const pd=Math.sqrt(pdSq);
                const pnx=pdx/pd, pny=pdy/pd;
                sp.x-=pnx*(sp.r+p.r-pd)*0.5; sp.y-=pny*(sp.r+p.r-pd)*0.5;
                sp.vx*=0.4; sp.vy*=0.4;
            }
        }
        if(step>30&&Math.abs(sp.vx)<0.15&&Math.abs(sp.vy)<0.15&&Math.abs(sb.vx)<0.15&&Math.abs(sb.vy)<0.15) break;
    }

    let score=0;
    if(goalScored){
        score = 2000000;
        if(ballBlockedByKeeper) score -= 1200000; 
    } else if(ownGoal){
        score=-1000000;
    } else {
        const gdx=oppGoalX-sb.x, gdy=(field.y+field.h/2)-sb.y;
        const gdist=Math.sqrt(gdx*gdx+gdy*gdy);
        score+=Math.max(0,1000-gdist)*8; 

        if(gdist>0) score+=((sb.vx*gdx+sb.vy*gdy)/gdist)*45;

        const myGoalY = field.y+field.h/2;
        const distToDefend = Math.sqrt((sp.x - (myGoalX - 80))**2 + (sp.y - myGoalY)**2);
        if(ball.x < field.x + field.w*0.5){
            score -= distToDefend * 4; 
            if(sb.x > field.x + field.w * 0.4) score += 8000; 
        }

        if(hitBall){
            score+=5000;
            score+=Math.hypot(sb.vx, sb.vy)*60;
        }else{
            if(ball.x < field.x + field.w * 0.4 && sp.x > ball.x) score += 3000 - distToDefend * 3;
            else score-=9000;
        }
        if(sb.y<field.y+25||sb.y>field.y+field.h-25) score-=1500;
    }
    if(power > 20 && !goalScored) score -= 150;
    return score;
}

            sp.x -= nx * overlap * 0.5; sp.y -= ny * overlap * 0.5;
            const dvx = sb.vx - sp.vx, dvy = sb.vy - sp.vy;
            const dvn = dvx * nx + dvy * ny;
            if(dvn < 0){
                const impulse = 2 * dvn / (sb.mass + sp.mass) * RESTITUTION;
                sb.vx -= impulse * sp.mass * nx; sb.vy -= impulse * sp.mass * ny;
                sp.vx += impulse * sb.mass * nx; sp.vy += impulse * sb.mass * ny;
            }
        }

        for(let p of players){

            const pdx = sp.x - p.x, pdy = sp.y - p.y;
            const pdSq = pdx * pdx + pdy * pdy;
            if(pdSq < (sp.r + p.r)**2 && pdSq > 0.0001){

                const pnx = pdx / pd, pny = pdy / pd;
                sp.x -= pnx * (sp.r + p.r - pd) * 0.5; sp.y -= pny * (sp.r + p.r - pd) * 0.5;
                const p_dvn = sp.vx * pnx + sp.vy * pny;
                if(p_dvn < 0) {
                    const impulse = 2 * p_dvn / (sp.mass + p.mass) * RESTITUTION;
                    sp.vx -= impulse * p.mass * pnx; sp.vy -= impulse * p.mass * pny;
                }
            }
        }

        for(let p of players){
            if(p === player) continue;
            const pdx = sb.x - p.x, pdy = sb.y - p.y;
            const pdSq = pdx * pdx + pdy * pdy;
            if(pdSq < (sb.r + p.r)**2 && pdSq > 0.0001){
                const pd = Math.sqrt(pdSq);
                const pnx = pdx / pd, pny = pdy / pd;
                sb.x -= pnx * (sb.r + p.r - pd) * 0.5; sb.y -= pny * (sb.r + p.r - pd) * 0.5;
                const p_dvn = sb.vx * pnx + sb.vy * pny;
                if(p_dvn < 0) {
                    const impulse = 2 * p_dvn / (sb.mass + p.mass) * RESTITUTION;
                    sb.vx -= impulse * p.mass * pnx; sb.vy -= impulse * p.mass * pny;
                }
            }
        }

        if(step % 2 === 0) {
            if(Math.abs(sp.vx) > 0.5 || Math.abs(sp.vy) > 0.5) spPath.push({x: sp.x, y: sp.y});
            if(hitBall && (Math.abs(sb.vx) > 0.5 || Math.abs(sb.vy) > 0.5)) sbPath.push({x: sb.x, y: sb.y});
        }
        if(Math.abs(sp.vx) < 0.15 && Math.abs(sp.vy) < 0.15 && Math.abs(sb.vx) < 0.15 && Math.abs(sb.vy) < 0.15) break;
    }
    return {spPath, sbPath, hitBall};
}

// ===== 渲染层 =====
function drawField(){
    const grad=ctx.createLinearGradient(0,field.y,0,field.y+field.h);
    grad.addColorStop(0,'#1a5c1a'); grad.addColorStop(0.5,'#2d8a3e'); grad.addColorStop(1,'#1a5c1a');
    ctx.fillStyle=grad; ctx.fillRect(field.x,field.y,field.w,field.h);

    const stripeH=50;
    for(let y=field.y;y<field.y+field.h;y+=stripeH*2){
        ctx.fillStyle='rgba(255,255,255,.025)'; ctx.fillRect(field.x,y,field.w,stripeH);
    }
    ctx.strokeStyle='rgba(255,255,255,.03)'; ctx.lineWidth=1;
    for(let i=0;i<field.w;i+=25){
        ctx.beginPath();ctx.moveTo(field.x+i,field.y);ctx.lineTo(field.x+i,field.y+field.h);ctx.stroke();
    }
    ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(field.x+field.w/2,field.y);ctx.lineTo(field.x+field.w/2,field.y+field.h);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x+field.w/2,field.y+field.h/2,70,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x+field.w/2,field.y+field.h/2,6,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();

    const penW=110,penH=240;
    ctx.strokeRect(field.x,field.y+field.h/2-penH/2,penW,penH);
    ctx.strokeRect(field.x+field.w-penW,field.y+field.h/2-penH/2,penW,penH);
    ctx.beginPath();ctx.arc(field.x+penW,field.y+field.h/2,45,Math.PI*-.5,Math.PI*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x+field.w-penW,field.y+field.h/2,45,Math.PI*.5,Math.PI*1.5);ctx.stroke();

    ctx.beginPath();ctx.arc(field.x,field.y,18,0,Math.PI*.5);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x,field.y+field.h,18,Math.PI*1.5,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x+field.w,field.y,18,Math.PI*.5,Math.PI);ctx.stroke();
    ctx.beginPath();ctx.arc(field.x+field.w,field.y+field.h,18,Math.PI,Math.PI*1.5);ctx.stroke();

    const flagR=5; ctx.fillStyle='#ff1744';
    [[field.x,field.y],[field.x+field.w,field.y],[field.x,field.y+field.h],[field.x+field.w,field.y+field.h]].forEach(([x,y])=>{
        ctx.beginPath();ctx.arc(x,y,flagR,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,flagR,0,Math.PI*2);ctx.stroke();
    });

    const goalY1=field.y+(field.h-GOAL_WIDTH)/2, goalY2=field.y+(field.h+GOAL_WIDTH)/2;
    [field.x-25, field.x+field.w].forEach(gx => {
        ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(gx,goalY1,25,GOAL_WIDTH);
        ctx.strokeStyle='#fff';ctx.lineWidth=4; ctx.strokeRect(gx,goalY1,25,GOAL_WIDTH);
        ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
        for(let i=0;i<=5;i++){
            ctx.beginPath();ctx.moveTo(gx,goalY1+i*GOAL_WIDTH/5);ctx.lineTo(gx+25,goalY1+i*GOAL_WIDTH/5);ctx.stroke();
            ctx.beginPath();ctx.moveTo(gx+i*25/5,goalY1);ctx.lineTo(gx+i*25/5,goalY2);ctx.stroke();
        }
    });

    ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=3; ctx.strokeRect(field.x,field.y,field.w,field.h);
    ctx.fillStyle='rgba(0,0,0,.2)'; walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));
}

function drawAiming(){
    if (autoAimResult && autoAimResult.pathData && selectedPlayer && currentTurn === 0 && gameState === 'playing') {
        const traj = autoAimResult.pathData;
        if(traj.spPath && traj.spPath.length > 0) {
            ctx.beginPath(); ctx.moveTo(traj.spPath[0].x, traj.spPath[0].y);
            for(let i=1; i<traj.spPath.length; i++) ctx.lineTo(traj.spPath[i].x, traj.spPath[i].y);
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.stroke();
            
            const endPlayer = traj.spPath[traj.spPath.length-1];
            ctx.beginPath(); ctx.arc(endPlayer.x, endPlayer.y, selectedPlayer.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0, 255, 136, 0.15)'; ctx.fill();
        }
        if(traj.hitBall && traj.sbPath && traj.sbPath.length > 0) {
            ctx.beginPath(); ctx.moveTo(traj.sbPath[0].x, traj.sbPath[0].y);
            for(let i=1; i<traj.sbPath.length; i++) ctx.lineTo(traj.sbPath[i].x, traj.sbPath[i].y);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.9)'; ctx.lineWidth = 3; ctx.setLineDash([6, 6]); ctx.stroke();
            
            const endBall = traj.sbPath[traj.sbPath.length-1];
            ctx.beginPath(); ctx.arc(endBall.x, endBall.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)'; ctx.fill();
        }
        ctx.setLineDash([]);
    }

    if (autoAimTarget && currentTurn === 0 && gameState === 'playing') {
        ctx.save();
        ctx.translate(autoAimTarget.x, autoAimTarget.y);
        ctx.rotate(Date.now()/500);
        ctx.strokeStyle = autoAimResult ? '#ffd700' : '#ff1744';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 20); ctx.stroke();
        ctx.restore();
    }

    if(!aimPlayer||!isAiming||currentTurn!==0||gameState!=='playing')return;
    const px=aimPlayer.x,py=aimPlayer.y;
    const dx=px-aimMouseX,dy=py-aimMouseY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const power=Math.min(dist/4,MAX_POWER);
    const angle=Math.atan2(dy,dx);

    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.setLineDash([6,6]);
    ctx.beginPath();ctx.arc(px,py,MAX_POWER*4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);

    ctx.strokeStyle='#5d3a1a';ctx.lineWidth=10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(aimMouseX,aimMouseY);ctx.lineTo(px,py);ctx.stroke();
    ctx.strokeStyle='#8B5a2b';ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(aimMouseX,aimMouseY);ctx.lineTo(px,py);ctx.stroke();

    ctx.fillStyle='#3d2817';ctx.beginPath();ctx.arc(aimMouseX,aimMouseY,13,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(aimMouseX,aimMouseY,13,0,Math.PI*2);ctx.stroke();

    const traj = getTrajectory(aimPlayer, angle, power);
    if(traj.spPath.length > 0) {
        ctx.beginPath(); ctx.moveTo(traj.spPath[0].x, traj.spPath[0].y);
        for(let i=1; i<traj.spPath.length; i++) ctx.lineTo(traj.spPath[i].x, traj.spPath[i].y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.stroke();
    }
    if(traj.hitBall && traj.sbPath.length > 0) {
        ctx.beginPath(); ctx.moveTo(traj.sbPath[0].x, traj.sbPath[0].y);
        for(let i=1; i<traj.sbPath.length; i++) ctx.lineTo(traj.sbPath[i].x, traj.sbPath[i].y);
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)'; ctx.lineWidth = 3; ctx.setLineDash([6, 6]); ctx.stroke();
    }
    ctx.setLineDash([]);

    const aimLen=power*12;
    const ax=px+Math.cos(angle)*aimLen;
    const ay=py+Math.sin(angle)*aimLen;
    const lineGrad=ctx.createLinearGradient(px,py,ax,ay);
    lineGrad.addColorStop(0,'rgba(0,255,136,.9)');
    lineGrad.addColorStop(1,'rgba(0,255,136,.2)');
    ctx.strokeStyle=lineGrad;ctx.lineWidth=4;ctx.setLineDash([10,8]);
    ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(ax,ay);ctx.stroke();ctx.setLineDash([]);

    ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=20;
    ctx.beginPath();ctx.moveTo(ax,ay);
    ctx.lineTo(ax-Math.cos(angle-0.4)*24,ay-Math.sin(angle-0.4)*24);
    ctx.lineTo(ax-Math.cos(angle+0.4)*24,ay-Math.sin(angle+0.4)*24);
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;

    document.getElementById('powerFill').style.width=(power/MAX_POWER*100)+'%';
}

function drawEntities(){
    // 渲染拖尾
    if (ball.trail && ball.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(ball.trail[0].x, ball.trail[0].y);
        for(let i=1; i<ball.trail.length; i++) ctx.lineTo(ball.trail[i].x, ball.trail[i].y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = ball.r * 1.5;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    if(aiAim&&currentTurn===1&&gameState==='playing'){
        const p=aiAim.player;
        const al=aiAim.power*12;
        const ax=p.x+Math.cos(aiAim.angle)*al;
        const ay=p.y+Math.sin(aiAim.angle)*al;
        ctx.strokeStyle='rgba(255,100,100,.5)';ctx.lineWidth=3;ctx.setLineDash([8,8]);
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(ax,ay);ctx.stroke();ctx.setLineDash([]);
    }

    players.forEach(p=>{
        ctx.fillStyle='rgba(0,0,0,.35)';
        ctx.beginPath();ctx.ellipse(p.x,p.y+p.r+4,p.r*0.9,p.r*0.3,0,0,Math.PI*2);ctx.fill();

        if(p.team===0){ctx.shadowColor=p.color;ctx.shadowBlur=12;}
        else{ctx.shadowColor='rgba(255,100,100,.3)';ctx.shadowBlur=8;}

        const pgrad=ctx.createRadialGradient(p.x-5,p.y-7,0,p.x,p.y,p.r);
        pgrad.addColorStop(0,'#fff'); pgrad.addColorStop(.25,p.sec||p.color); pgrad.addColorStop(1,p.color);
        ctx.fillStyle=pgrad;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;

        ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=2.5;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();

        ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(p.number,p.x,p.y);

        if(p===aimPlayer || p===selectedPlayer){
            ctx.strokeStyle='#00ff88';ctx.lineWidth=4;ctx.shadowColor='#00ff88';ctx.shadowBlur=25;
            ctx.beginPath();ctx.arc(p.x,p.y,p.r+8,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
        } else if(currentTurn===0&&p.team===0&&!isAiming&&gameState==='playing'&&!shotFired){
            const pulse=Math.sin(Date.now()/180)*4;
            ctx.strokeStyle='rgba(0,255,136,.6)';ctx.lineWidth=2.5;
            ctx.beginPath();ctx.arc(p.x,p.y,p.r+10+pulse,0,Math.PI*2);ctx.stroke();
            ctx.strokeStyle='rgba(0,255,136,.25)';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(p.x,p.y,p.r+16+pulse,0,Math.PI*2);ctx.stroke();
        }

        if(currentTurn===1&&p.team===1){
            const pulse=Math.sin(Date.now()/150)*3;
            ctx.strokeStyle='rgba(255,100,100,.7)';ctx.lineWidth=2.5;
            ctx.beginPath();ctx.arc(p.x,p.y,p.r+5+pulse,0,Math.PI*2);ctx.stroke();
        }
    });

    const bSpeed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    const ballRot=(Date.now()/800)*bSpeed*3;
    ctx.save(); ctx.translate(ball.x,ball.y); ctx.rotate(ballRot);
    const bgrad=ctx.createRadialGradient(-4,-4,0,0,0,ball.r);
    bgrad.addColorStop(0,'#fff'); bgrad.addColorStop(.2,'#e8e8e8'); bgrad.addColorStop(1,'#222');
    ctx.fillStyle=bgrad; ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5; ctx.beginPath();ctx.arc(0,0,ball.r,0,Math.PI*2);ctx.stroke();

    ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-ball.r+4,0);ctx.lineTo(ball.r-4,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-ball.r+4);ctx.lineTo(0,ball.r-4);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,ball.r-4,0,Math.PI*2);ctx.stroke();
    ctx.restore();

    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.beginPath();ctx.ellipse(ball.x,ball.y+ball.r+3,ball.r*0.9,ball.r*0.3,0,0,Math.PI*2);ctx.fill();

    // 渲染火花特效
    for(let i=sparks.length-1;i>=0;i--){
        const s = sparks[i];
        s.x += s.vx; s.y += s.vy;
        s.life--;
        ctx.fillStyle = s.color;
        ctx.globalAlpha = Math.max(0, s.life / 40);
        ctx.fillRect(s.x, s.y, 3, 3);
        ctx.globalAlpha = 1;
        if(s.life <= 0) sparks.splice(i, 1);
    }

    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx;p.y+=p.vy; p.vy+=p.gravity||0.12; p.vx*=p.drag||0.97; p.vy*=p.drag||0.97; p.life--;
        ctx.globalAlpha=Math.max(0,p.life/140); ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/140),0,Math.PI*2);ctx.fill();
        ctx.globalAlpha=1;
        if(p.life<=0)particles.splice(i,1);
    }
}

function draw(){
    ctx.save();
    if(cameraShake>0){
        ctx.translate((Math.random()-.5)*cameraShake,(Math.random()-.5)*cameraShake);
        cameraShake*=0.88;
        if(cameraShake<0.5)cameraShake=0;
    }
    ctx.fillStyle='#0a1a0a';ctx.fillRect(0,0,W,H);
    drawField();
    if(gameState==='playing'||gameState==='goalAnimating'||gameState==='ended'){
        drawAiming(); drawEntities();
    }
    if(flashAlpha>0){
        ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0,0,W,H);
        flashAlpha*=0.85; if(flashAlpha<0.01)flashAlpha=0;
    }
    ctx.restore();
}

function gameLoop(){
    if(gameState==='playing'){
        updatePhysics();
        checkGoal();
        if(shotFired&&!isAnythingMoving()){
            shotFired=false;
            currentTurn=currentTurn===0?1:0;
            updateTurnUI();
            if(currentTurn===1) setTimeout(runAI,500);
        }
    }
    draw();
    requestAnimationFrame(gameLoop);
}

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    if(e.touches)return{x:e.touches[0].clientX-rect.left,y:e.touches[0].clientY-rect.top};
    return{x:e.clientX-rect.left,y:e.clientY-rect.top};
}

canvas.addEventListener('mousedown',handleStart); canvas.addEventListener('mousemove',handleMove); canvas.addEventListener('mouseup',handleEnd);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleStart(e)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();handleMove(e)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();handleEnd()},{passive:false});

function handleStart(e){
    AudioEngine.init(); // 唤醒AudioContext
    if(gameState!=='playing'||currentTurn!==0||shotFired)return;
    if(!isAiming&&isAnythingMoving())return;
    const pos=getPos(e); const now=Date.now();

    if (now - lastTapTime < 500 && Math.hypot(pos.x - lastTapPos.x, pos.y - lastTapPos.y) < 40) {
        if (autoAimResult && autoAimTarget && selectedPlayer) {
            if (Math.hypot(pos.x - autoAimTarget.x, pos.y - autoAimTarget.y) < 60) {
                fireAutoAim(); return;
            }
        }
    }
    lastTapTime = now; lastTapPos = pos;

    for(let p of players){
        if(p.team!==0)continue;
        const dist=Math.sqrt((pos.x-p.x)**2+(pos.y-p.y)**2);
        if(dist<p.r+30){
            // 选中球员音效
            if(selectedPlayer !== p) AudioEngine.play('hit', 0.1);
            selectedPlayer=p; aimPlayer=p; isAiming=true; aimMouseX=pos.x; aimMouseY=pos.y;
            
            if(isCalculatingAutoAim) isCalculatingAutoAim = false; // 中断原有寻路
            autoAimTarget=null; autoAimResult=null;
            document.getElementById('turnIndicator').textContent='向后拉蓄力 · 或点击空地智能瞄准';
            document.getElementById('turnIndicator').style.color='#00ff88';
            return;
        }
    }

    if (selectedPlayer && !isCalculatingAutoAim) {
        autoAimTarget = {x: pos.x, y: pos.y};
        calculateAutoAim(selectedPlayer, autoAimTarget);
    }
}

function handleMove(e){
    if(!isAiming||!aimPlayer||gameState!=='playing')return;
    const pos=getPos(e); aimMouseX=pos.x; aimMouseY=pos.y;
}

function handleEnd(){
    if(!isAiming||!aimPlayer)return;
    const shooter=aimPlayer;
    const dx=shooter.x-aimMouseX, dy=shooter.y-aimMouseY;
    const power=Math.min(Math.sqrt(dx*dx+dy*dy)/4, MAX_POWER);

    if(power>1.5){
        AudioEngine.play('kick', Math.min(1, power/10));
        const angle=Math.atan2(dy,dx);
        shooter.vx=Math.cos(angle)*power; shooter.vy=Math.sin(angle)*power;
        shotFired=true;
        
        isAiming=false; aimPlayer=null; selectedPlayer=null;
        autoAimTarget=null; autoAimResult=null; isCalculatingAutoAim = false;
        document.getElementById('powerFill').style.width='0%';
        document.getElementById('turnIndicator').textContent='射门！';
        document.getElementById('turnIndicator').style.color='#fff';
    } else {
        isAiming=false; aimPlayer=null; 
        document.getElementById('powerFill').style.width='0%';
    }
}

function endGame(winner){
    gameState='ended'; showScreen('resultScreen');
    const isWin=winner===0;
    document.getElementById('resEmoji').textContent=isWin?'🏆':'😢';
    document.getElementById('resTitle').textContent=isWin?`${selectedTeam.name} 获胜！`:`${opponentTeam.name} 获胜！`;
    document.getElementById('resTitle').style.color=isWin?'#00ff88':'#ff1744';
    document.getElementById('resScore').textContent=`${scores[0]} - ${scores[1]}`;
}

function restartGame(){
    scores=[0,0];currentTurn=0;gameState='playing';
    particles=[]; sparks=[]; ball.trail=[]; aimPlayer=null;isAiming=false;shotFired=false;aiAim=null;flashAlpha=0;
    selectedPlayer=null;autoAimTarget=null;autoAimResult=null;isCalculatingAutoAim=false;
    showScreen('gameScreen'); initField();initPlayers();resetBall(); updateTurnUI();
}

resize();
showScreen('mainMenu');
requestAnimationFrame(gameLoop);
</script>
