<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>现代部落冲突 ∙ NEXUS WAR</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg:       #04060b;
–bg1:      #080d16;
–bg2:      #0c1220;
–blue:     #00c8ff;
–blue-dim: #005577;
–blue-glow:#00c8ff44;
–red:      #ff2244;
–red-dim:  #550011;
–red-glow: #ff224444;
–gold:     #f0b830;
–gold2:    #ffd060;
–green:    #00ff99;
–yellow:   #ffe040;
–purple:   #aa55ff;
–border:   #1a2640;
–border2:  #223355;
–text-dim: #8aa6b8;
–text:     #b8d8ee;
–text-bright: #d0eeff;
–panel-bg: rgba(6,10,18,0.97);
}

body {
background: var(–bg);
color: var(–text);
font-family: ‘Exo 2’, sans-serif;
overflow: hidden;
height: 100vh; height: 100dvh; width: 100vw;
user-select: none;
-webkit-user-select: none;
touch-action: manipulation;
-webkit-text-size-adjust: 100%;
}

/* ── SCANLINE OVERLAY ── */
body::before {
content:’’;
position:fixed; inset:0;
background: repeating-linear-gradient(0deg,
rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px,
transparent 1px, transparent 3px);
pointer-events:none; z-index:9999;
}

/* ── VIGNETTE ── */
body::after {
content:’’;
position:fixed; inset:0;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
pointer-events:none; z-index:9998;
}

#game-container { display:flex; flex-direction:column; height:100vh; height:100dvh; width:100vw; overflow:hidden; }

/* ══════════════ HUD TOP ══════════════ */
#hud-top {
display:flex; justify-content:space-between; align-items:center;
padding: 0 20px;
background: linear-gradient(180deg, rgba(4,6,14,0.99) 0%, rgba(6,10,20,0.95) 100%);
border-bottom: 1px solid var(–border);
height: 62px; flex-shrink:0;
position:relative; overflow:hidden;
box-shadow: 0 4px 30px rgba(0,0,0,0.8);
}
#hud-top::after {
content:’’;
position:absolute; bottom:0; left:0; right:0; height:1px;
background: linear-gradient(90deg, var(–blue-dim), var(–blue), var(–blue-dim));
animation: linepulse 3s ease-in-out infinite;
}
@keyframes linepulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* Corner decorations */
#hud-top::before {
content:’’;
position:absolute; inset:0;
background:
linear-gradient(135deg, rgba(0,200,255,0.05) 0%, transparent 30%),
linear-gradient(225deg, rgba(255,34,68,0.05) 0%, transparent 30%);
pointer-events:none;
}

#hud-left, #hud-right {
display:flex; gap:0; align-items:stretch;
}
#hud-right { flex-direction:row-reverse; }

.hud-block {
display:flex; flex-direction:column; align-items:center; justify-content:center;
padding: 0 14px;
border-right: 1px solid var(–border);
min-width: 64px; height: 62px;
position:relative;
}
#hud-right .hud-block { border-right:none; border-left: 1px solid var(–border); }

.hud-block:hover { background: rgba(0,200,255,0.04); }

.hud-label {
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px; color: var(–text-dim);
text-transform: uppercase; letter-spacing: 2px;
margin-bottom: 2px;
}
.hud-value {
font-family: ‘Orbitron’, monospace;
font-size: 16px; color: var(–text-bright); font-weight: 700;
line-height:1;
}
.hud-value.gold { color: var(–gold); text-shadow: 0 0 10px var(–gold); }
.hud-value.blue { color: var(–blue); text-shadow: 0 0 8px var(–blue); }
.hud-value.red  { color: var(–red);  text-shadow: 0 0 8px var(–red); }

#hud-center { text-align:center; flex:1; }

#game-title {
font-family: ‘Orbitron’, monospace;
font-size: 13px; font-weight: 900;
letter-spacing: 5px;
background: linear-gradient(90deg, var(–blue), #ffffff 50%, var(–red));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text;
text-transform: uppercase;
}

#game-subtitle {
font-family: ‘Share Tech Mono’, monospace;
font-size: 8px; color: var(–text-dim);
letter-spacing: 4px; margin-top: 1px;
text-transform: uppercase;
}

#wave-info {
display:flex; gap:16px; justify-content:center;
margin-top:4px; font-size:11px;
}
.wave-item {
display:flex; align-items:center; gap:4px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px; color: var(–text-dim);
}
.wave-item .val { color: var(–text); }

/* ══════════════ CANVAS ══════════════ */
#gameCanvas {
flex:1 1 auto; display:block; width:100%; min-height:0;
cursor: crosshair;
touch-action: manipulation;
image-rendering: pixelated;
}

/* ══════════════ CONTROL PANEL ══════════════ */
#control-panel {
background: linear-gradient(180deg, var(–bg2) 0%, var(–bg1) 100%);
border-top: 1px solid var(–border);
padding: 8px 14px;
flex-shrink:0;
display:flex; gap:10px; align-items:center;
height: clamp(104px, 18dvh, 128px);
box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
position:relative;
}
#control-panel::before {
content:’’;
position:absolute; top:0; left:0; right:0; height:1px;
background: linear-gradient(90deg, transparent, var(–border2), transparent);
}

/* ─ Command Buttons ─ */
#command-buttons { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }

.cmd-btn {
display:flex; align-items:center; gap:7px;
padding: 0 14px; height: 46px;
border:none; border-radius: 4px;
cursor:pointer; font-family:‘Exo 2’, sans-serif;
font-size:12px; font-weight:700; letter-spacing:1px;
transition: all 0.15s; width:122px;
position:relative; overflow:hidden;
text-transform:uppercase;
}
.cmd-btn::after {
content:’’;
position:absolute; inset:0;
background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
}
.cmd-btn:active { transform:scale(0.96); }

.attack-btn {
background: linear-gradient(135deg, #cc1122, #990011);
color:#ffdddd; border:1px solid #ff2244;
}
.attack-btn:hover {
background: linear-gradient(135deg, #ff2244, #cc1122);
box-shadow: 0 0 16px rgba(255,34,68,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.recall-btn {
background: linear-gradient(135deg, #004499, #003377);
color:#ddeeff; border:1px solid #0077cc;
}
.recall-btn:hover {
background: linear-gradient(135deg, #0066cc, #004499);
box-shadow: 0 0 16px rgba(0,120,255,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-icon { font-size:18px; }

/* ─ Unit Panel ─ */
#unit-panel { flex:1; overflow:hidden; display:flex; flex-direction:column; gap:4px; }

.panel-section-label {
font-family:‘Share Tech Mono’,monospace;
font-size:9px; color: var(–text-dim);
text-transform:uppercase; letter-spacing:3px;
padding:0 2px;
display:flex; align-items:center; gap:6px;
}
.panel-section-label::before {
content:’’; display:inline-block; width:16px; height:1px;
background: var(–border2);
}

.units-row {
display:flex; gap:5px; overflow-x:auto; padding-bottom:2px; align-items:center;
}
.units-row::-webkit-scrollbar { height:2px; }
.units-row::-webkit-scrollbar-track { background:var(–bg); }
.units-row::-webkit-scrollbar-thumb { background: var(–border2); border-radius:1px; }

.unit-btn {
display:flex; flex-direction:column; align-items:center;
padding:4px 6px;
background: var(–bg2);
border: 1px solid var(–border);
border-radius:5px; cursor:pointer;
transition: all 0.12s;
min-width:72px; max-width:72px; flex-shrink:0;
position:relative; overflow:hidden;
}
.unit-btn::before {
content:’’; position:absolute; top:0; left:0; right:0; height:1px;
background: linear-gradient(90deg, transparent, rgba(0,200,255,0.3), transparent);
opacity:0; transition:opacity 0.12s;
}
.unit-btn:hover {
border-color: var(–blue);
background: rgba(0,100,150,0.15);
box-shadow: 0 0 10px rgba(0,200,255,0.2), inset 0 1px 0 rgba(0,200,255,0.1);
}
.unit-btn:hover::before { opacity:1; }
.unit-btn:active { transform:scale(0.94); }
.unit-btn.cant-afford { opacity:0.28; cursor:not-allowed; filter:grayscale(0.5); }
.unit-btn .unit-icon { font-size:18px; line-height:1.1; }
.unit-btn .unit-name { font-size:9px; color:var(–text-bright); margin-top:2px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; }
.unit-btn .unit-cost {
font-family:‘Orbitron’,monospace; font-size:10px;
color: var(–gold2); margin-top:1px;
}
.unit-btn.group-btn { background: rgba(80,40,120,0.12); border-color:#2a1844; }
.unit-btn.group-btn:hover { border-color:#aa55ff; box-shadow:0 0 10px rgba(160,80,255,0.3); }
.unit-btn.group-btn .unit-cost { color:#cc99ff; }
.unit-btn .unit-count-badge {
position:absolute; top:2px; right:2px;
background:rgba(0,200,255,0.2); border:1px solid var(–blue);
border-radius:2px; font-size:7px; font-family:‘Share Tech Mono’,monospace;
color:var(–blue); padding:0 2px; line-height:12px;
}
.unit-btn.group-btn .unit-count-badge { background:rgba(160,80,255,0.2); border-color:#aa55ff; color:#aa55ff; }

/* ══════════════ GAME OVER ══════════════ */
#game-over {
position:fixed; inset:0;
background: rgba(0,0,0,0.9);
display:flex; align-items:center; justify-content:center;
z-index:200; backdrop-filter:blur(8px);
}
#game-over.hidden { display:none; }

#game-over-content {
background: linear-gradient(135deg, var(–bg1), var(–bg2));
border: 1px solid var(–border2);
border-radius: 12px; padding: 52px 72px;
text-align:center; min-width:420px;
position:relative; overflow:hidden;
box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 1px var(–border);
}
#game-over-content::before {
content:’’; position:absolute; top:0; left:0; right:0; height:2px;
background: linear-gradient(90deg, transparent, var(–blue), transparent);
}
#game-over-content.victory::before {
background: linear-gradient(90deg, transparent, var(–green), transparent);
}
#game-over-content.defeat::before {
background: linear-gradient(90deg, transparent, var(–red), transparent);
}

#game-over-title {
font-family:‘Orbitron’,monospace; font-size:34px; font-weight:900;
letter-spacing:5px; margin-bottom:8px;
text-shadow: 0 0 30px currentColor;
}
#game-over-subtitle {
font-family:‘Share Tech Mono’,monospace;
font-size:11px; letter-spacing:4px;
color:var(–text-dim); text-transform:uppercase;
margin-bottom:28px;
}
#game-over-result {
font-size:20px; font-weight:600; margin-bottom:24px;
}
#game-over-stats {
color:var(–text); font-size:13px; line-height:2.2; margin-bottom:36px;
font-family:‘Share Tech Mono’,monospace;
border: 1px solid var(–border); border-radius:6px;
padding: 12px 20px; background: rgba(0,0,0,0.3);
}

#restart-btn {
padding:14px 48px;
background: linear-gradient(135deg, var(–blue-dim), #003366);
border: 1px solid var(–blue); border-radius:5px;
color:white; font-family:‘Orbitron’,monospace;
font-size:13px; font-weight:700; letter-spacing:3px;
cursor:pointer; transition:all 0.2s; text-transform:uppercase;
}
#restart-btn:hover {
background: linear-gradient(135deg, #004488, var(–blue-dim));
box-shadow: 0 0 24px rgba(0,200,255,0.5);
transform:translateY(-2px);
}

/* ── TOOLTIP ── */
.unit-btn[title]:hover::after {
display:none;
}

/* ── KILL FEED ── */
#kill-feed {
position:fixed; right:20px; top:80px;
width:180px; z-index:50;
pointer-events:none;
}
.kill-item {
background: rgba(6,10,20,0.9);
border-left:2px solid var(–red);
padding:4px 8px; margin-bottom:4px;
font-size:10px; font-family:‘Share Tech Mono’,monospace;
color:var(–text); animation:killfade 2.5s ease forwards;
border-radius:0 3px 3px 0;
}
@keyframes killfade { 0%{opacity:0;transform:translateX(20px)} 10%{opacity:1;transform:translateX(0)} 80%{opacity:1} 100%{opacity:0} }

/* ── ALERT BANNER ── */
#alert-banner {
position:fixed; top:72px; left:50%; transform:translateX(-50%);
z-index:100; pointer-events:none;
}
.alert-msg {
font-family:‘Orbitron’,monospace;
background: rgba(255,34,68,0.15);
border:1px solid var(–red);
color:var(–red); font-size:13px; letter-spacing:3px;
padding:6px 20px; border-radius:3px;
animation: alertpop 3s ease forwards;
text-transform:uppercase;
}
.alert-msg.blue {
background: rgba(0,200,255,0.1); border-color:var(–blue); color:var(–blue);
}
@keyframes alertpop {
0%{opacity:0;transform:translateY(-10px) scale(0.9)}
10%{opacity:1;transform:translateY(0) scale(1)}
75%{opacity:1}
100%{opacity:0;transform:translateY(-5px)}
}

/* ── ABILITY INDICATORS ── */
.unit-btn .unit-tags { display:flex; gap:2px; margin-top:2px; flex-wrap:wrap; justify-content:center; }
.unit-tag {
font-size:6px; padding:0px 3px; border-radius:2px;
font-family:‘Share Tech Mono’,monospace; text-transform:uppercase; letter-spacing:0.5px;
}
.tag-heal  { background:rgba(255,100,150,0.2); color:#ff88bb; border:1px solid #ff88bb44; }
.tag-range { background:rgba(0,200,255,0.1); color:#00c8ff; border:1px solid #00c8ff44; }
.tag-splash{ background:rgba(255,160,0,0.15); color:#ffa000; border:1px solid #ffa00044; }
.tag-stun  { background:rgba(255,240,0,0.1); color:#ffe040; border:1px solid #ffe04044; }
.tag-mech  { background:rgba(80,120,255,0.1); color:#7090ff; border:1px solid #7090ff44; }
.tag-elite { background:rgba(160,80,255,0.12); color:#aa55ff; border:1px solid #aa55ff44; }


@media (max-width: 760px), (max-height: 620px) {
  #hud-top { height: auto; min-height: 54px; padding: 4px 8px; gap:6px; }
  .hud-block { min-width: 48px; height: 48px; padding: 0 6px; }
  .hud-label { font-size: 8px; letter-spacing: 1px; color: var(–text); }
  .hud-value { font-size: 13px; }
  #game-title { font-size: 10px; letter-spacing: 2px; }
  #game-subtitle { display:none; }
  #wave-info { gap:6px; margin-top:2px; flex-wrap:wrap; }
  .wave-item { font-size: 9px; color: var(–text); }
  #control-panel { height: clamp(92px, 24dvh, 112px); padding: 6px 8px; gap:6px; }
  #command-buttons { gap:4px; }
  .cmd-btn { width: 92px; height: 40px; padding: 0 6px; font-size: 10px; gap:4px; }
  .btn-icon { font-size: 15px; }
  #unit-panel { min-width:0; gap:2px; }
  .panel-section-label { font-size: 8px; letter-spacing: 1px; color: var(–text); }
  .units-row { gap:4px; padding-bottom:1px; }
  .unit-btn { min-width:64px; max-width:64px; padding:3px 4px; }
  .unit-btn .unit-icon { font-size:16px; }
  .unit-btn .unit-name { font-size:8px; }
  .unit-btn .unit-cost { font-size:8px; }
  .unit-tag { font-size:5px; padding:0 2px; }
  #kill-feed { right:8px; top:62px; width:150px; }
  #alert-banner { top:60px; width:calc(100vw - 20px); text-align:center; }
  .alert-msg { font-size:11px; letter-spacing:1px; padding:5px 10px; }
}

@media (max-width: 520px) {
  #hud-top { align-items:stretch; }
  #hud-center { order:-1; flex:0 0 100%; display:none; }
  #hud-left, #hud-right { flex:1; justify-content:center; }
  .hud-block { flex:1; min-width:0; }
}

</style>

</head>
<body>
<div id="game-container">
  <div id="hud-top">
    <div id="hud-left">
      <div class="hud-block">
        <span class="hud-label">金币</span>
        <span id="player-gold" class="hud-value gold">5000</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">驻守</span>
        <span id="player-garrison" class="hud-value blue">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">进攻</span>
        <span id="player-attacking" class="hud-value red">0</span>
      </div>
    </div>

<div id="hud-center">
  <div id="game-title">NEXUS WAR · 现代部落冲突</div>
  <div id="game-subtitle">TACTICAL COMBAT SIMULATION</div>
  <div id="wave-info">
    <div class="wave-item">⏱ <span id="game-time" class="val">00:00</span></div>

<div id="hud-right">
  <div class="hud-block">
    <span class="hud-label">金币</span>

  </div>
  <div class="hud-block">
    <span class="hud-label">驻守</span>
    <span id="ai-garrison" class="hud-value blue">0</span>

  <div class="hud-block">

</div>

<canvas id="gameCanvas"></canvas>

  <div id="control-panel">

      <button class="cmd-btn attack-btn" onclick="game.attackAll()">
        <span class="btn-icon">⚔️</span><span>全部进攻</span>

      <button class="cmd-btn recall-btn" onclick="game.recallAll()">
        <span class="btn-icon">🛡️</span><span>全部撤回</span>
      </button>

    <div id="unit-panel">
      <div class="panel-section-label">单体单位</div>
      <div id="single-units" class="units-row"></div>
      <div class="panel-section-label">作战群组</div>
      <div id="group-units" class="units-row"></div>

  </div>
</div>

<div id="kill-feed"></div>
<div id="alert-banner"></div>

<div id="game-over" class="hidden">
  <div id="game-over-content">
    <div id="game-over-title"></div>
    <div id="game-over-subtitle">BATTLE CONCLUDED</div>
    <div id="game-over-result"></div>
    <div id="game-over-stats"></div>

<script>
/* =====================================================================
   UTILITIES
===================================================================== */
function dist(x1,y1,x2,y2){ const dx=x2-x1,dy=y2-y1; return Math.sqrt(dx*dx+dy*dy); }
function fastRemove(arr,i){ arr[i]=arr[arr.length-1]; arr.pop(); }
function lerp(a,b,t){ return a+(b-a)*t; }

class ObjectPool {
  constructor(factory){ this.factory=factory; this.pool=[]; }
  acquire(){ return this.pool.length>0?this.pool.pop():this.factory(); }
  release(obj){ this.pool.push(obj); }
}

class SpatialGrid {
  constructor(cellSize){ this.cellSize=cellSize; this.cells=new Map(); this._pool=[]; }
  clear(){ for(const a of this.cells.values()){a.length=0;this._pool.push(a);} this.cells.clear(); }
  _key(cx,cy){ return `${cx},${cy}`; }
  _getCell(cx,cy){ const k=this._key(cx,cy); let a=this.cells.get(k); if(!a){a=this._pool.length>0?this._pool.pop():[]; this.cells.set(k,a);} return a; }
  insert(e){ this._getCell(Math.floor(e.x/this.cellSize),Math.floor(e.y/this.cellSize)).push(e); }
  queryNearest(x,y,r,f){
    let best=null,bsq=r*r; const cs=this.cellSize;
    const mx=Math.floor((x-r)/cs),ax=Math.floor((x+r)/cs),my=Math.floor((y-r)/cs),ay=Math.floor((y+r)/cs);
    for(let cx=mx;cx<=ax;cx++) for(let cy=my;cy<=ay;cy++){
      const arr=this.cells.get(this._key(cx,cy)); if(!arr) continue;
      for(let i=0;i<arr.length;i++){const e=arr[i];if(f&&!f(e))continue;const dx=e.x-x,dy=e.y-y,d=dx*dx+dy*dy;if(d<bsq){bsq=d;best=e;}}
    }
    return best;
  }
  query(x,y,r,f){
    const res=[]; const cs=this.cellSize; const rsq=r*r;
    const mx=Math.floor((x-r)/cs),ax=Math.floor((x+r)/cs),my=Math.floor((y-r)/cs),ay=Math.floor((y+r)/cs);
    for(let cx=mx;cx<=ax;cx++) for(let cy=my;cy<=ay;cy++){
      const arr=this.cells.get(this._key(cx,cy)); if(!arr) continue;
      for(let i=0;i<arr.length;i++){const e=arr[i];if(f&&!f(e))continue;const dx=e.x-x,dy=e.y-y;if(dx*dx+dy*dy<=rsq)res.push(e);}
    }
    return res;
  }
}

/* =====================================================================
   UNIT DEFINITIONS

/* =====================================================================
   PROJECTILE
===================================================================== */
class Projectile {
  constructor(){ this.x=0;this.y=0;this.target=null;this.damage=0;this.color='#fff';this.game=null;this.fromUnit=false;this.shooter=null;this.speed=380;this.dead=false;this.size=3;this.trail=[];this.age=0; }
  init(x,y,target,damage,color,game,fromUnit,shooter){
    this.x=x;this.y=y;this.target=target;this.damage=damage;this.color=color;this.game=game;this.fromUnit=fromUnit;this.shooter=shooter;
    this.speed=380;this.dead=false;this.size=fromUnit?3:5;this.trail.length=0;this.age=0;
    return this;
  }
  update(dt){
    if(!this.target||this.target.dead||this.target.hp<=0){this.dead=true;return;}
    this.age+=dt;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    const tx=this.target.x,ty=this.target.y;
    const d=dist(this.x,this.y,tx,ty);
    const step=(this.speed*dt)/1000;
    if(d<=step+2){
      this.target.takeDamage(this.damage,this.shooter);
      this.game.spawnParticles(tx,ty,this.color,6);
      this.dead=true;
    } else {
      this.x+=((tx-this.x)/d)*step;
      this.y+=((ty-this.y)/d)*step;
    }
  }
  draw(ctx){
    ctx.save();
    // Trail
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const a=(i/this.trail.length)*0.45;
      ctx.globalAlpha=a;
      ctx.fillStyle=this.color;
      ctx.beginPath(); ctx.arc(t.x,t.y,this.size*0.5*(i/this.trail.length),0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // Glow
    ctx.shadowColor=this.color; ctx.shadowBlur=12;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
    // Core white
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size*0.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

/* =====================================================================
   PARTICLE SYSTEMS
===================================================================== */
class LightningEffect {
  constructor(x1,y1,x2,y2,color,life){ this.x1=x1;this.y1=y1;this.x2=x2;this.y2=y2;this.color=color;this.life=life;this.maxLife=life;this.segs=8; }
  draw(ctx){
    ctx.save();
    ctx.globalAlpha=this.life/this.maxLife;
    ctx.strokeStyle=this.color; ctx.lineWidth=1.5;
    ctx.shadowColor=this.color; ctx.shadowBlur=6;
    ctx.beginPath();
    const dx=(this.x2-this.x1)/this.segs, dy=(this.y2-this.y1)/this.segs;
    ctx.moveTo(this.x1,this.y1);
    for(let i=1;i<this.segs;i++){
      const jitter=10*(1-i/this.segs);
      ctx.lineTo(this.x1+dx*i+(Math.random()-.5)*jitter, this.y1+dy*i+(Math.random()-.5)*jitter);
    }
    ctx.lineTo(this.x2,this.y2); ctx.stroke();
    ctx.restore();
  }
}

/* =====================================================================
   GAME ENGINE
===================================================================== */
class Game {
  constructor(){
    this.canvas=document.getElementById('gameCanvas');
    this.ctx=this.canvas.getContext('2d');
    this.running=false; this.gameOver=false;
    this.lastTime=0; this.kills=0;
    this.startTime=0; this.elapsed=0;
    this.selectedUnit=null;
    this.bgStars=[];
    this.lastKillTime=0;
    this.killStreak=0;

    this.particlePool=new ObjectPool(()=>({x:0,y:0,vx:0,vy:0,color:'#fff',size:2,life:0,maxLife:0}));
    this.projectilePool=new ObjectPool(()=>new Projectile());
    this.textPool=new ObjectPool(()=>({x:0,y:0,text:'',color:'#fff',size:14,life:0,maxLife:0}));
    this.ringPool=new ObjectPool(()=>({x:0,y:0,color:'#fff',life:0,maxLife:0,r:0}));

    this.unitGrid=new SpatialGrid(80);
    this.buildingGrid=new SpatialGrid(80);

    this.particles=[]; this.projectiles=[];
    this.floatingTexts=[]; this.effects=[];
    this.lightnings=[];

    this._hud={playerGold:-1,aiGold:-1,playerGarrison:-1,playerAttacking:-1,aiGarrison:-1,aiAttacking:-1,time:'',kills:-1};

    this.player=null; this.ai=null;

    this.generateBgStars(200);
    this.init();
    this.buildUI();
    this.setupInput();
    window.addEventListener('resize',()=>this.resize());
    this.resize();
  }

  generateBgStars(n){
    this.bgStars=[];
    for(let i=0;i<n;i++) this.bgStars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.2,a:Math.random()*0.5+0.1,twinkle:Math.random()*Math.PI*2});
  }

  setupInput(){
    this.canvas.addEventListener('click',e=>this.handleCanvasClick(e));
    this.canvas.addEventListener('dblclick',e=>e.preventDefault());
    document.addEventListener('gesturestart',e=>e.preventDefault());
    document.addEventListener('keydown',e=>{
      if(e.key==='a'||e.key==='A') this.attackAll();
      if(e.key==='r'||e.key==='R') this.recallAll();
      if(e.key==='Escape') this.selectedUnit=null;
    });
  }

  handleCanvasClick(e){
    if(this.gameOver) return;
    const rect=this.canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(this.canvas.width/rect.width);
    const my=(e.clientY-rect.top)*(this.canvas.height/rect.height);
    const unit=this.unitGrid.queryNearest(mx,my,30,u=>u.side==='player'&&!u.dead);
    this.selectedUnit=unit||null;
  }

  resize(){
    const container=document.getElementById('game-container');
    const hud=document.getElementById('hud-top');
    const panel=document.getElementById('control-panel');
    this.canvas.width=container.clientWidth;
    this.canvas.height=container.clientHeight-hud.offsetHeight-panel.offsetHeight;
    if(this.player) this.layoutVillages();
  }

  init(){
    for(const p of this.particles) this.particlePool.release(p);
    for(const p of this.projectiles) this.projectilePool.release(p);
    for(const t of this.floatingTexts) this.textPool.release(t);
    for(const e of this.effects) this.ringPool.release(e);
    this.particles.length=0; this.projectiles.length=0;
    this.floatingTexts.length=0; this.effects.length=0;
    this.lightnings.length=0;

    this.player=new Village('player',this);
    this.ai=new Village('ai',this);
    this.kills=0; this.killStreak=0;
    this.startTime=Date.now(); this.elapsed=0;
    this.selectedUnit=null; this.gameOver=false;
    document.getElementById('game-over').classList.add('hidden');
    this.layoutVillages();
    this._hud={playerGold:-1,aiGold:-1,playerGarrison:-1,playerAttacking:-1,aiGarrison:-1,aiAttacking:-1,time:'',kills:-1};
    this.updateHUD();
    if(!this.running){
      this.running=true; this.lastTime=0;
      requestAnimationFrame(t=>this.loop(t));
    }
  }

  layoutVillages(){
    const W=this.canvas.width,H=this.canvas.height,cx=H/2;
    this.player.x=120; this.player.y=cx; this.player.layoutBuildings();
    this.ai.x=W-120; this.ai.y=cx; this.ai.layoutBuildings();
  }

  loop(timestamp){
    if(!this.running) return;
    const dt=Math.min(timestamp-this.lastTime,50);
    this.lastTime=timestamp;
    if(!this.gameOver){
      this.elapsed=Date.now()-this.startTime;
      this.update(dt);
    }
    this.draw();
    requestAnimationFrame(t=>this.loop(t));
  }

  update(dt){
    this.unitGrid.clear(); this.buildingGrid.clear();
    for(const v of [this.player,this.ai]){
      for(let i=0;i<v.units.length;i++){if(!v.units[i].dead)this.unitGrid.insert(v.units[i]);}
      for(let i=0;i<v.buildings.length;i++){if(!v.buildings[i].dead)this.buildingGrid.insert(v.buildings[i]);}
    }

    this.player.update(dt);
    this.ai.update(dt);

    for(let i=this.projectiles.length-1;i>=0;i--){
      this.projectiles[i].update(dt);
      if(this.projectiles[i].dead){this.projectilePool.release(this.projectiles[i]);fastRemove(this.projectiles,i);}
    }
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i]; p.life-=dt;
      p.x+=p.vx*dt*0.06; p.y+=p.vy*dt*0.06; p.vy+=0.04*dt;
      if(p.life<=0){this.particlePool.release(p);fastRemove(this.particles,i);}
    }
    for(let i=this.floatingTexts.length-1;i>=0;i--){
      const t=this.floatingTexts[i]; t.life-=dt; t.y-=0.04*dt;
      if(t.life<=0){this.textPool.release(t);fastRemove(this.floatingTexts,i);}
    }
    for(let i=this.effects.length-1;i>=0;i--){
      this.effects[i].life-=dt;
      if(this.effects[i].life<=0){this.ringPool.release(this.effects[i]);fastRemove(this.effects,i);}
    }
    for(let i=this.lightnings.length-1;i>=0;i--){
      this.lightnings[i].life-=dt;
      if(this.lightnings[i].life<=0) fastRemove(this.lightnings,i);
    }

    this.updateHUD();
    this.checkGameOver();
  }

  checkGameOver(){
    const pbd=this.player.buildings.find(b=>b.type==='base'&&b.hp<=0);
    const abd=this.ai.buildings.find(b=>b.type==='base'&&b.hp<=0);
    if(pbd||abd){
      this.gameOver=true;
      const win=!!abd;
      const el=document.getElementById('game-over-content');
      el.classList.remove('victory','defeat');
      el.classList.add(win?'victory':'defeat');
      const t=document.getElementById('game-over-title');
      t.textContent=win?'胜利':'战败';
      t.style.color=win?'#00ff99':'#ff2244';
      document.getElementById('game-over-result').textContent=win?'敌方指挥中心已被摧毁！':'我方指挥中心已被摧毁！';
      document.getElementById('game-over-result').style.color=win?'#00cc66':'#cc1133';
      const timeStr=this.formatTime(this.elapsed);
      document.getElementById('game-over-stats').innerHTML=
        `存活时间 · ${timeStr}\n消灭敌军 · ${this.kills} 人\n最终评级 · ${this.getRating(win)}`;
      document.getElementById('game-over').classList.remove('hidden');
    }
  }

  getRating(win){
    if(!win) return '☆ 需要更多训练';
    const mins=this.elapsed/60000;
    if(mins<2) return '★★★ 闪电战胜';
    if(mins<5) return '★★☆ 干净利落';
    return '★☆☆ 险胜';
  }

  formatTime(ms){
    const s=Math.floor(ms/1000),m=Math.floor(s/60);
    return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  /* ── DRAW ── */
  draw(){
    const ctx=this.ctx,W=this.canvas.width,H=this.canvas.height;
    const t=Date.now()*0.001;

    // Deep background
    ctx.fillStyle='#04060b';
    ctx.fillRect(0,0,W,H);

    // Stars
    for(const s of this.bgStars){
      const flicker=0.5+0.5*Math.sin(t*1.5+s.twinkle);
      ctx.globalAlpha=s.a*flicker;
      ctx.fillStyle='#ffffff';
      ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // Subtle grid
    ctx.strokeStyle='rgba(15,30,50,0.7)'; ctx.lineWidth=0.5;
    const gs=50;
    for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Horizon line scanline
    ctx.strokeStyle=`rgba(0,100,200,${0.15+0.05*Math.sin(t*0.5)})`;
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,H*0.5); ctx.lineTo(W,H*0.5); ctx.stroke();

    // Territory glow
    const lg=ctx.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,'rgba(0,80,180,0.07)');
    lg.addColorStop(0.48,'rgba(0,80,180,0.03)');
    lg.addColorStop(0.52,'rgba(180,0,30,0.03)');
    lg.addColorStop(1,'rgba(180,0,30,0.07)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,W,H);

    // Center divider
    ctx.save();
    const cdG=ctx.createLinearGradient(0,0,0,H);
    cdG.addColorStop(0,'rgba(255,255,255,0)');
    cdG.addColorStop(0.3,'rgba(255,255,255,0.06)');
    cdG.addColorStop(0.5,'rgba(255,255,255,0.1)');
    cdG.addColorStop(0.7,'rgba(255,255,255,0.06)');
    cdG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=cdG; ctx.lineWidth=1;
    ctx.setLineDash([6,10]);
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Villages
    this.player.draw(ctx);
    this.ai.draw(ctx);

    // Death rings
    for(let i=0;i<this.effects.length;i++){
      const e=this.effects[i]; const t2=1-e.life/e.maxLife;
      const r=e.r?(e.r+40*t2):5+40*t2;
      ctx.save();
      ctx.globalAlpha=e.life/e.maxLife*0.9;
      ctx.strokeStyle=e.color; ctx.lineWidth=2*(1-t2)+0.5;
      ctx.shadowColor=e.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke();
      // Inner ring
      ctx.globalAlpha=(e.life/e.maxLife)*0.4;
      ctx.beginPath(); ctx.arc(e.x,e.y,r*0.5,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.restore();
    }

    // Lightning effects
    for(const l of this.lightnings) l.draw(ctx);

    // Projectiles
    for(let i=0;i<this.projectiles.length;i++) this.projectiles[i].draw(ctx);

    // Particles
    for(let i=0;i<this.particles.length;i++){
      const p=this.particles[i];
      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
      ctx.shadowColor=p.color; ctx.shadowBlur=4;
      ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Floating texts
    for(let i=0;i<this.floatingTexts.length;i++){
      const ft=this.floatingTexts[i]; const alpha=Math.max(0,ft.life/ft.maxLife);
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.font=`bold ${ft.size}px 'Exo 2',sans-serif`;
      ctx.fillStyle=ft.color;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=ft.color; ctx.shadowBlur=6;
      ctx.fillText(ft.text,ft.x,ft.y);
      ctx.restore();
    }

    this.drawSelection(ctx);
    this.drawUnitInfo(ctx);
    this.drawMinimap(ctx,W,H);
    this.drawBattleStatus(ctx,W,H);
  }

  drawSelection(ctx){
    if(!this.selectedUnit||this.selectedUnit.dead){this.selectedUnit=null;return;}
    const u=this.selectedUnit, nt=Date.now()*0.006;
    ctx.save(); ctx.translate(u.x,u.y);
    // Rotating selection ring
    ctx.rotate(nt*0.5);
    ctx.strokeStyle=`rgba(0,255,150,${0.5+0.4*Math.sin(nt*2)})`;
    ctx.lineWidth=2; ctx.setLineDash([6,4]);
    ctx.shadowColor='#00ff99'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(0,0,u.size+9,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]); ctx.shadowBlur=0;
    // Range circle
    if(u.range>0){
      ctx.rotate(-nt*0.5);
      ctx.strokeStyle='rgba(0,255,150,0.1)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(0,0,u.range,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  drawUnitInfo(ctx){
    if(!this.selectedUnit||this.selectedUnit.dead) return;
    const u=this.selectedUnit, def=UNIT_DEFS[u.typeId];
    const px=10, py=this.canvas.height-160, pw=220, ph=150;
    ctx.save();
    ctx.fillStyle='rgba(4,8,16,0.93)';
    ctx.strokeStyle='#1a2640'; ctx.lineWidth=1;
    ctx.shadowColor='rgba(0,150,255,0.3)'; ctx.shadowBlur=15;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,8); ctx.fill();
    ctx.shadowBlur=0; ctx.stroke();
    // Top accent
    ctx.fillStyle=u.color; ctx.fillRect(px,py,pw,2);

    ctx.textAlign='left';
    ctx.font=`bold 16px 'Exo 2'`; ctx.fillStyle=u.color;
    ctx.fillText(`${def.icon} ${def.name}`,px+12,py+22);

    ctx.font=`11px 'Share Tech Mono'`; ctx.fillStyle='#6688aa';
    ctx.fillText(`HP`,px+12,py+42); ctx.fillText(`ATK`,px+12,py+57); ctx.fillText(`RNG`,px+12,py+72); ctx.fillText(`SPD`,px+12,py+87);

    ctx.fillStyle='#aaccee';
    ctx.fillText(`${Math.round(u.hp)} / ${u.maxHp}`,px+50,py+42);
    ctx.fillText(u.attack,px+50,py+57);
    ctx.fillText(u.range,px+50,py+72);
    ctx.fillText(u.speed,px+50,py+87);

    const stateLabel=u.state==='garrison'?'● 驻守':u.state==='attack'?'● 进攻':'● 撤回';
    ctx.fillStyle=u.state==='garrison'?'#00ff99':u.state==='attack'?'#ff3344':'#ffee44';
    ctx.font=`bold 11px 'Share Tech Mono'`; ctx.fillText(stateLabel,px+130,py+57);

    ctx.fillStyle='#334455'; ctx.font=`10px 'Exo 2'`;
    ctx.fillText(def.description,px+12,py+105);

    const bx=px+12,by=py+ph-18,bw=pw-24,bh=7,pct=u.hp/u.maxHp;
    ctx.fillStyle='#0a0c14';
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,2); ctx.fill();
    const hcol=pct>0.5?'#00cc55':pct>0.25?'#ffaa00':'#ff2233';
    ctx.fillStyle=hcol;
    ctx.shadowColor=hcol; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*pct,bh,2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }

  drawMinimap(ctx,W,H){
    const mmW=160,mmH=100,mmX=W-mmW-12,mmY=12;
    ctx.save();
    ctx.fillStyle='rgba(3,6,12,0.9)';
    ctx.strokeStyle='#1a2640'; ctx.lineWidth=1;
    ctx.shadowColor='rgba(0,100,200,0.3)'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.roundRect(mmX,mmY,mmW,mmH,5); ctx.fill();
    ctx.shadowBlur=0; ctx.stroke();
    // Title
    ctx.font=`7px 'Share Tech Mono'`; ctx.fillStyle='#334455'; ctx.textAlign='center';
    ctx.fillText('TACTICAL MAP',mmX+mmW/2,mmY+9);

    ctx.beginPath(); ctx.roundRect(mmX,mmY,mmW,mmH,5); ctx.clip();
    const scX=mmW/W,scY=mmH/H;

    // Center line
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    ctx.setLineDash([3,5]);
    ctx.beginPath(); ctx.moveTo(mmX+mmW/2,mmY); ctx.lineTo(mmX+mmW/2,mmY+mmH); ctx.stroke();
    ctx.setLineDash([]);

    for(const v of [this.player,this.ai]){
      const isP=v.side==='player';
      const c=isP?'#00aaff':'#ff2244';
      for(let i=0;i<v.buildings.length;i++){
        const b=v.buildings[i]; if(b.dead) continue;
        const s=b.type==='base'?4:b.type==='tower'?3:1;
        ctx.fillStyle=c;
        ctx.shadowColor=c; ctx.shadowBlur=3;
        ctx.fillRect(mmX+b.x*scX-s/2,mmY+b.y*scY-s/2,s,s);
      }
      ctx.shadowBlur=0;
      for(let i=0;i<v.units.length;i++){
        const u=v.units[i]; if(u.dead) continue;
        ctx.fillStyle=u.state==='attack'?(isP?'#ff6688':'#ff4466'):c;
        ctx.fillRect(mmX+u.x*scX-1,mmY+u.y*scY-1,2,2);
      }
    }

    if(this.selectedUnit&&!this.selectedUnit.dead){
      ctx.fillStyle='#00ff99';
      ctx.shadowColor='#00ff99'; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.arc(mmX+this.selectedUnit.x*scX,mmY+this.selectedUnit.y*scY,3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  drawBattleStatus(ctx,W,H){
    // Base HP bars at top corners
    const pBase=this.player.getBase(), aBase=this.ai.getBase();
    if(!pBase||!aBase) return;

    const drawBaseBar=(x,y,hp,maxHp,color,label,flip)=>{
      const bw=120,bh=8,pad=10;
      const bx=flip?W-x-bw:x;
      ctx.save();
      ctx.font=`8px 'Share Tech Mono'`; ctx.fillStyle=color; ctx.textAlign=flip?'right':'left';
      ctx.fillText(label,flip?bx+bw:bx,y-2);
      ctx.fillStyle='#0a0c14';
      ctx.beginPath(); ctx.roundRect(bx,y,bw,bh,2); ctx.fill();
      const pct=hp/maxHp;
      ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.roundRect(bx,y,bw*pct,bh,2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.textAlign='center'; ctx.font=`7px 'Share Tech Mono'`;
      ctx.fillText(`${Math.round(hp)}/${maxHp}`,bx+bw/2,y+bh-1);
      ctx.restore();
    };

    drawBaseBar(12,this.canvas.height-18,Math.max(0,pBase.hp),pBase.maxHp,'#00aaff','🏛 指挥中心',false);
    drawBaseBar(12,this.canvas.height-18,Math.max(0,aBase.hp),aBase.maxHp,'#ff2244','🏯 敌方基地',true);

    // Threat level
    const mins=this.elapsed/60000;
    const threat=mins<1?'低':mins<3?'中':mins<6?'高':'极危';
    const threatEl=document.getElementById('threat-level');
    if(threatEl) threatEl.textContent=threat;
  }

  /* ── SPAWN HELPERS ── */
  spawnParticles(x,y,color,count=8){
    for(let i=0;i<count;i++){
      const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
      const p=this.particlePool.acquire();
      p.x=x;p.y=y;p.vx=Math.cos(a)*sp;p.vy=Math.sin(a)*sp;
      p.color=color;p.size=1+Math.random()*2.5;p.life=300+Math.random()*400;p.maxLife=700;
      this.particles.push(p);
    }
  }

  spawnExplosion(x,y,color,size=1){
    // Particles
    this.spawnParticles(x,y,color,12*size);
    this.spawnParticles(x,y,'#ffffff',4*size);
    // Ring
    const r=this.ringPool.acquire();
    r.x=x;r.y=y;r.color=color;r.life=600;r.maxLife=600;r.r=size*5;
    this.effects.push(r);
    // Secondary ring
    const r2=this.ringPool.acquire();
    r2.x=x;r2.y=y;r2.color='#ffffff';r2.life=300;r2.maxLife=300;r2.r=size*2;
    this.effects.push(r2);
  }

  spawnDeathRing(x,y,color){
    const r=this.ringPool.acquire();
    r.x=x;r.y=y;r.color=color;r.life=500;r.maxLife=500;r.r=0;
    this.effects.push(r);
  }

  spawnFloatingText(x,y,text,color='#ffffff',size=14){
    const t=this.textPool.acquire();
    t.x=x;t.y=y;t.text=text;t.color=color;t.size=size;t.life=900;t.maxLife=900;
    this.floatingTexts.push(t);
  }

  spawnLightning(x1,y1,x2,y2,color='#ffff00'){
    this.lightnings.push(new LightningEffect(x1,y1,x2,y2,color,200));
  }

  addKillFeed(text){
    const feed=document.getElementById('kill-feed');
    const item=document.createElement('div');
    item.className='kill-item'; item.textContent=text;
    feed.insertBefore(item,feed.firstChild);
    if(feed.children.length>5) feed.removeChild(feed.lastChild);
    setTimeout(()=>{ if(item.parentNode) item.parentNode.removeChild(item); },2500);
  }

  showAlert(text,isBlue=false){
    const banner=document.getElementById('alert-banner');
    const msg=document.createElement('div');
    msg.className=`alert-msg${isBlue?' blue':''}`;
    msg.textContent=text;
    banner.appendChild(msg);
    setTimeout(()=>{ if(msg.parentNode) msg.parentNode.removeChild(msg); },3000);
  }

  /* ── HUD ── */
  updateHUD(){
    const pg=Math.floor(this.player.gold), ag=Math.floor(this.ai.gold);
    const pgS=this.player.units.filter(u=>u.state==='garrison').length;
    const paS=this.player.units.filter(u=>u.state==='attack').length;
    const agS=this.ai.units.filter(u=>u.state==='garrison').length;
    const aaS=this.ai.units.filter(u=>u.state==='attack').length;
    const timeStr=this.formatTime(this.elapsed);

    if(pg!==this._hud.playerGold){
      document.getElementById('player-gold').textContent=pg; this._hud.playerGold=pg;
      document.querySelectorAll('.unit-btn').forEach(btn=>{
        const cost=parseInt(btn.dataset.cost);
        btn.classList.toggle('cant-afford',pg<cost);
      });
    }
    if(ag!==this._hud.aiGold){document.getElementById('ai-gold').textContent=ag;this._hud.aiGold=ag;}
    if(pgS!==this._hud.playerGarrison){document.getElementById('player-garrison').textContent=pgS;this._hud.playerGarrison=pgS;}
    if(paS!==this._hud.playerAttacking){document.getElementById('player-attacking').textContent=paS;this._hud.playerAttacking=paS;}
    if(agS!==this._hud.aiGarrison){document.getElementById('ai-garrison').textContent=agS;this._hud.aiGarrison=agS;}
    if(aaS!==this._hud.aiAttacking){document.getElementById('ai-attacking').textContent=aaS;this._hud.aiAttacking=aaS;}
    if(timeStr!==this._hud.time){document.getElementById('game-time').textContent=timeStr;this._hud.time=timeStr;}
    if(this.kills!==this._hud.kills){document.getElementById('kills').textContent=this.kills;this._hud.kills=this.kills;}
  }

  /* ── UI BUILD ── */
  buildUI(){
    const tagHtml=(tags)=>tags.map(tag=>`<span class="unit-tag tag-${tag}">${{range:'远程',splash:'溅射',stun:'眩晕',heal:'回血',mech:'机甲',elite:'精英'}[tag]||tag}</span>`).join('');

    const singleRow=document.getElementById('single-units');
    for(const [id,def] of Object.entries(UNIT_DEFS)){
      const btn=document.createElement('button');
      btn.className='unit-btn'; btn.dataset.cost=def.cost;
      btn.innerHTML=`<span class="unit-icon">${def.icon}</span><span class="unit-name">${def.name}</span><span class="unit-cost">${def.cost}💰</span><div class="unit-tags">${tagHtml(def.tags||[])}</div>`;
      btn.title=`${def.name}\n${def.description}\nHP:${def.hp} ATK:${def.attack} RNG:${def.range} SPD:${def.speed}`;
      btn.addEventListener('click',()=>this.spawnUnit(id));
      singleRow.appendChild(btn);
    }

    const groupRow=document.getElementById('group-units');
    for(const [id,def] of Object.entries(GROUP_DEFS)){
      const btn=document.createElement('button');
      btn.className='unit-btn group-btn'; btn.dataset.cost=def.cost;
      btn.innerHTML=`<span class="unit-count-badge">${def.badge||'G'}</span><span class="unit-icon">${def.icon}</span><span class="unit-name">${def.name}</span><span class="unit-cost">${def.cost}💰</span>`;
      btn.title=`${def.name}\n${def.description}`;
      btn.addEventListener('click',()=>this.spawnUnit(id));
      groupRow.appendChild(btn);
    }
  }

  attackAll(){
    let count=0;
    this.player.units.forEach(u=>{if(u.state==='garrison'){u.setState('attack');count++;}});
    if(count>0) this.showAlert(`⚔ ${count}名部队发起进攻！`,true);
  }
  recallAll(){
    let count=0;
    this.player.units.forEach(u=>{if(u.state==='attack'){u.setState('recall');count++;}});
    if(count>0) this.showAlert(`🛡 ${count}名部队撤回防守`,true);
  }

  spawnUnit(typeId){
    const def=UNIT_DEFS[typeId], groupDef=GROUP_DEFS[typeId];
    if(def){
      if(this.player.gold<def.cost) return;
      this.player.gold-=def.cost;
      this.player.spawnUnit(typeId);
    } else if(groupDef){
      if(this.player.gold<groupDef.cost) return;
      this.player.gold-=groupDef.cost;
      for(const comp of groupDef.composition)
        for(let i=0;i<comp.count;i++) this.player.spawnUnit(comp.type);
      this.showAlert(`${groupDef.icon} ${groupDef.name} 已部署！`,true);
    }
  }

  restart(){ this.running=false; setTimeout(()=>this.init(),100); }
}

/* =====================================================================
   VILLAGE
===================================================================== */
class Village {
  constructor(side,game){
    this.side=side; this.game=game;
    this.gold=5000; this.goldRate=10;
    this.x=0; this.y=0;
    this.units=[]; this.buildings=[];
    this.aiTimer=0; this.aiAggressionTimer=0;
    this.difficultyScale=1;
  }

  layoutBuildings(){
    const x=this.x,y=this.y,flip=this.side==='ai'?-1:1;
    this.buildings=[];
    this.buildings.push(new Building('base',x,y,this));
    this.buildings.push(new Building('tower',x+flip*52,y-58,this));
    this.buildings.push(new Building('tower',x+flip*52,y+58,this));
    this.buildings.push(new Building('tower',x+flip*82,y,this));
    for(let wy=-60;wy<=60;wy+=20)
      this.buildings.push(new Building('wall',x+flip*102,y+wy,this));
  }

  get enemy(){ return this.side==='player'?this.game.ai:this.game.player; }

  spawnUnit(typeId){
    const def=UNIT_DEFS[typeId]; if(!def) return;
    const unit=new Unit(typeId,this);
    unit.x=this.x+(Math.random()-.5)*60;
    unit.y=this.y+(Math.random()-.5)*80;
    unit.setState('garrison');
    this.units.push(unit);
  }

  update(dt){
    this.gold+=(this.goldRate*this.difficultyScale*dt)/1000;
    for(let i=this.units.length-1;i>=0;i--){
      this.units[i].update(dt);
      if(this.units[i].dead) fastRemove(this.units,i);
    }
    for(let i=0;i<this.buildings.length;i++) this.buildings[i].update(dt);
    if(this.side==='ai') this.updateAI(dt);
    this.difficultyScale=1+(this.game.elapsed/120000)*0.8;
  }

  updateAI(dt){
    this.aiTimer+=dt; this.aiAggressionTimer+=dt;
    const elapsed=this.game.elapsed,scale=this.difficultyScale;
    const spawnInterval=Math.max(3000,8000-elapsed/5000);
    if(this.aiTimer>=spawnInterval){this.aiTimer=0;this.aiSpawnLogic(elapsed,scale);}
    const attackInterval=Math.max(12000,30000-elapsed/3000);
    if(this.aiAggressionTimer>=attackInterval){this.aiAggressionTimer=0;this.aiAttackDecision(scale);}
    const playerAttacking=this.game.player.units.filter(u=>u.state==='attack').length;
    if(playerAttacking>=6&&Math.random()<0.02) this.aiCounterAttack(scale);
  }

  aiSpawnLogic(elapsed,scale){
    const budget=Math.min(2000,300*scale);
    if(this.gold<budget*0.4) return;
    let spent=0;
    const pool=this.getAIUnitPool(elapsed);
    while(spent<budget&&this.gold>50){
      const choice=pool[Math.floor(Math.random()*pool.length)];
      const def=UNIT_DEFS[choice];
      if(!def||this.gold<def.cost) break;
      this.gold-=def.cost; this.spawnUnit(choice); spent+=def.cost;
    }
  }

  getAIUnitPool(elapsed){
    const m=elapsed/60000;
    if(m<1) return ['infantry','infantry','heavy'];
    if(m<2) return ['infantry','heavy','sniper','special'];
    if(m<4) return ['heavy','sniper','special','emp','unitree'];
    if(m<6) return ['special','unitree','lightMech','sniper','nano'];
    return ['lightMech','heavyMech','unitree','special','nano','emp'];
  }

  aiAttackDecision(scale){
    const gc=this.units.filter(u=>u.state==='garrison').length;
    const min=Math.max(3,Math.floor(4/scale));
    if(gc>=min){
      const toSend=Math.floor(gc*(0.6+Math.random()*0.2)); let sent=0;
      for(const u of this.units) if(u.state==='garrison'&&sent<toSend){u.setState('attack');sent++;}
    }
  }

  aiCounterAttack(scale){
    let sent=0;
    for(const u of this.units) if(u.state==='garrison'){u.setState('attack');sent++;}
    if(sent>0) this.game.showAlert('⚠ 敌方发起反击！');
    if(this.gold>500){
      const pool=['lightMech','heavyMech','unitree','special'];
      let budget=this.gold*0.7;
      while(budget>100){
        const choice=pool[Math.floor(Math.random()*pool.length)];
        const def=UNIT_DEFS[choice];
        if(!def||this.gold<def.cost) break;
        this.gold-=def.cost; this.spawnUnit(choice);
        const nu=this.units[this.units.length-1];
        if(nu) nu.setState('attack');
        budget-=def.cost;
      }
    }
  }

  draw(ctx){ for(const b of this.buildings) b.draw(ctx); for(const u of this.units) u.draw(ctx); }
  getBase(){ return this.buildings.find(b=>b.type==='base'); }
}

/* =====================================================================
   BUILDING
===================================================================== */
class Building {
  constructor(type,x,y,village){
    this.type=type; this.x=x; this.y=y;
    this.village=village; this.side=village.side;
    const def=BUILDING_DEFS[type];
    this.hp=def.hp; this.maxHp=def.maxHp;
    this.attack=def.attack; this.range=def.range||0;
    this.width=def.width; this.height=def.height;
    this.attackSpeed=def.attackSpeed||1500; this.attackTimer=0;
    this.dead=false; this.flashTimer=0;
    this.pulsePhase=Math.random()*Math.PI*2;
  }

  get enemy(){ return this.village.enemy; }

  update(dt){
    if(this.dead) return;
    this.flashTimer=Math.max(0,this.flashTimer-dt);
    if(this.type==='tower'&&this.attack>0){
      this.attackTimer+=dt;
      if(this.attackTimer>=this.attackSpeed){this.attackTimer=0;this.fireAtEnemy();}
    }
    if(this.hp<=0){
      this.dead=true;
      this.village.game.spawnExplosion(this.x,this.y,'#ff6600',this.type==='base'?3:1.5);
      this.village.game.spawnFloatingText(this.x,this.y-30,'💥 DESTROYED','#ff4400',14);
    }
  }

  fireAtEnemy(){
    const closest=this.village.game.unitGrid.queryNearest(this.x,this.y,this.range,u=>u.side!==this.side&&!u.dead);
    if(closest){
      const proj=this.village.game.projectilePool.acquire();
      proj.init(this.x,this.y,closest,this.attack,this.side==='player'?'#00aaff':'#ff2244',this.village.game,false,null);
      this.village.game.projectiles.push(proj);
    }
  }

  takeDamage(amount){
    this.hp=Math.max(0,this.hp-amount);
    this.flashTimer=120;
    if(Math.random()<0.4)
      this.village.game.spawnFloatingText(this.x+(Math.random()-.5)*25,this.y-20,`-${Math.round(amount)}`,'#ff5566',10);
  }

  draw(ctx){
    if(this.dead) return;
    const isP=this.side==='player', flash=this.flashTimer>0;
    const t=Date.now()*0.001+this.pulsePhase;
    const pulse=0.6+0.4*Math.sin(t*1.5);

    ctx.save();
    ctx.translate(this.x,this.y);

    if(this.type==='base'){
      const s=this.width*0.5;
      // Outer glow ring
      ctx.globalAlpha=0.3*pulse; ctx.strokeStyle=isP?'#00aaff':'#ff2244'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(0,0,s+14,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
      // Base glow bg
      const grd=ctx.createRadialGradient(0,0,0,0,0,s*1.5);
      grd.addColorStop(0,isP?'rgba(0,100,200,0.15)':'rgba(200,0,30,0.15)');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,s*1.5,0,Math.PI*2); ctx.fill();
      // Body
      if(flash){ ctx.shadowColor='#ffffff'; ctx.shadowBlur=20; }
      else { ctx.shadowColor=isP?'#0066ff':'#ff0022'; ctx.shadowBlur=12*pulse; }
      ctx.fillStyle=flash?'#ffffff':(isP?'#061830':'#180608');
      ctx.strokeStyle=isP?'#0088ff':'#ff1133'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(-s,-s,s*2,s*2,6); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font=`${s*0.7}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(isP?'🏛':'🏯',0,0);
      // HP bar
      this._drawHPBar(ctx,0,-s-14,s*2,6);
      // HP label
      ctx.font=`7px 'Share Tech Mono'`; ctx.fillStyle='#556677'; ctx.textAlign='center';
      ctx.fillText(`${Math.round(this.hp)}/${this.maxHp}`,0,-s-20);

    } else if(this.type==='tower'){
      const s=this.width*0.5;
      ctx.shadowColor=isP?'#0066aa':'#aa0022'; ctx.shadowBlur=8*pulse;
      ctx.fillStyle=flash?'#ffffff':(isP?'#061428':'#140608');
      ctx.strokeStyle=isP?'#0055aa':'#880011'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(-s,-s,s*2,s*2,4); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font=`${s*0.9}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🗼',0,0);
      this._drawHPBar(ctx,0,-s-8,s*2,3);

    } else if(this.type==='wall'){
      const pct=this.hp/this.maxHp;
      const c=pct>0.5?'#1e3348':pct>0.25?'#2a2210':'#1c100a';
      ctx.fillStyle=flash?'#ffffff':c;
      ctx.strokeStyle='#2a3a4a'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(-this.width/2,-this.height/2,this.width,this.height,2); ctx.fill(); ctx.stroke();
      this._drawHPBar(ctx,0,-this.height/2-5,this.width,2);
    }
    ctx.restore();
  }

  _drawHPBar(ctx,x,y,w,h){
    const pct=this.hp/this.maxHp;
    ctx.fillStyle='#060c14'; ctx.beginPath(); ctx.roundRect(x-w/2,y,w,h,1); ctx.fill();
    const c=pct>0.5?'#00cc44':pct>0.25?'#ffaa00':'#ff1122';
    ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=3;
    ctx.beginPath(); ctx.roundRect(x-w/2,y,w*pct,h,1); ctx.fill();
    ctx.shadowBlur=0;
  }
}

/* =====================================================================
   UNIT
===================================================================== */
class Unit {
  constructor(typeId,village){
    this.typeId=typeId;
    const def=UNIT_DEFS[typeId];
    this.village=village; this.side=village.side;
    this.name=def.name; this.icon=def.icon; this.color=def.color;
    this.maxHp=def.maxHp; this.hp=def.hp;
    this.attack=def.attack; this.range=def.range; this.speed=def.speed;
    this.size=def.size; this.splashRadius=def.splashRadius||0;
    this.stunDuration=def.stunDuration||0; this.immuneToStun=def.immuneToStun||false;
    this.priorityTarget=def.priorityTarget||null;
    this.regenRate=def.regenRate||0; this.healRange=def.healRange||0; this.healRate=def.healRate||0;
    this.x=0; this.y=0; this.state='garrison'; this.dead=false;
    this.attackTimer=1000; this.attackSpeed=1000;
    this.stunTimer=0; this.flashTimer=0;
    this.patrolOffset={x:(Math.random()-.5)*50,y:(Math.random()-.5)*50};
    this.deathAnimTimer=0; this.lastTarget=null;
  }

  get enemy(){ return this.village.enemy; }
  setState(state){ this.state=state; }

  update(dt){
    if(this.dead) return;
    this.flashTimer=Math.max(0,this.flashTimer-dt);
    this.stunTimer=Math.max(0,this.stunTimer-dt);
    this.attackTimer+=dt;
    if(this.regenRate>0) this.hp=Math.min(this.maxHp,this.hp+(this.regenRate*dt)/1000);
    if(this.healRate>0){
      const allies=this.village.game.unitGrid.query(this.x,this.y,this.healRange,u=>u.side===this.side&&u!==this&&!u.dead&&u.hp<u.maxHp);
      for(const a of allies) a.hp=Math.min(a.maxHp,a.hp+(this.healRate*dt)/1000);
    }
    if(this.stunTimer>0) return;
    if(this.state==='garrison') this.updateGarrison(dt);
    else if(this.state==='attack') this.updateAttack(dt);
    else if(this.state==='recall') this.updateRecall(dt);
  }

  updateGarrison(dt){
    const base=this.village.getBase(); if(!base) return;
    const homeX=base.x+this.patrolOffset.x, homeY=base.y+this.patrolOffset.y;
    const ce=this.village.game.unitGrid.queryNearest(this.x,this.y,180,u=>u.side!==this.side&&u.state==='attack'&&!u.dead);
    if(ce) this.fightTarget(ce,dt);
    else this.moveToward(homeX,homeY,dt,0.5);
  }

  updateAttack(dt){
    let target=null;
    if(this.priorityTarget==='building')
      target=this.village.game.buildingGrid.queryNearest(this.x,this.y,2000,b=>b.side!==this.side&&!b.dead&&b.hp>0);
    if(!target) target=this.village.game.unitGrid.queryNearest(this.x,this.y,2000,u=>u.side!==this.side&&!u.dead);
    if(!target) target=this.village.game.buildingGrid.queryNearest(this.x,this.y,2000,b=>b.side!==this.side&&!b.dead&&b.hp>0);
    if(target) this.fightTarget(target,dt);
  }

  updateRecall(dt){
    const base=this.village.getBase();
    if(!base){this.setState('garrison');return;}
    if(dist(this.x,this.y,base.x,base.y)<80) this.setState('garrison');
    else this.moveToward(base.x,base.y,dt,1);
  }

  fightTarget(target,dt){
    const d=dist(this.x,this.y,target.x,target.y);
    const effR=this.range+(target.width||0)/2;
    if(d>effR) this.moveToward(target.x,target.y,dt,1);
    else if(this.attackTimer>=this.attackSpeed){this.attackTimer=0;this.fireAt(target);}
  }

  fireAt(target){
    if(this.attack<=0||this.typeId==='medic') return;
    const game=this.village.game;

    if(this.stunDuration>0){
      target.takeDamage(this.attack,this);
      if(!target.immuneToStun&&target.stunTimer<=0){
        target.stunTimer=this.stunDuration;
        game.spawnLightning(this.x,this.y,target.x,target.y,'#ffff00');
        game.spawnFloatingText(target.x,target.y-20,'⚡ 眩晕','#ffff00',12);
      }
      game.spawnParticles(target.x,target.y,'#ffff00',5);
      return;
    }

    if(this.splashRadius>0){
      const targets=[
        ...game.unitGrid.query(target.x,target.y,this.splashRadius,e=>e.side!==this.side&&!e.dead),
        ...game.buildingGrid.query(target.x,target.y,this.splashRadius,e=>e.side!==this.side&&!e.dead&&e.hp>0)
      ];
      for(const e of targets){
        const d=dist(target.x,target.y,e.x,e.y);
        e.takeDamage(this.attack*(0.4+0.6*(1-d/this.splashRadius)),this);
      }
      game.spawnExplosion(target.x,target.y,'#ffaa00',1.5);
      return;
    }

    const proj=game.projectilePool.acquire();
    proj.init(this.x,this.y,target,this.attack,this.color,game,true,this);
    game.projectiles.push(proj);
  }

  moveToward(tx,ty,dt,sm=1){
    const d=dist(this.x,this.y,tx,ty);
    if(d<2) return;
    const step=(this.speed*sm*dt)/1000;
    const r=Math.min(step/d,1);
    this.x+=(tx-this.x)*r; this.y+=(ty-this.y)*r;
  }

  takeDamage(amount,attacker){
    this.hp-=amount; this.flashTimer=90;
    if(this.hp<=0){
      this.hp=0; this.dead=true;
      this.village.game.spawnExplosion(this.x,this.y,this.color,0.8);
      if(attacker&&attacker.village!==this.village&&attacker.village.side==='player'){
        this.village.game.kills++;
        // Kill streak
        const now=Date.now();
        if(now-this.village.game.lastKillTime<2000) this.village.game.killStreak++;
        else this.village.game.killStreak=1;
        this.village.game.lastKillTime=now;
        if(this.village.game.killStreak>=3)
          this.village.game.spawnFloatingText(this.x,this.y-30,`🔥 ${this.village.game.killStreak}连杀！`,'#ff8800',16);
        if(Math.random()<0.3)
          this.village.game.addKillFeed(`⚔ 击杀 ${this.name}`);
      }
    }
  }

  draw(ctx){
    if(this.dead) return;
    const isP=this.side==='player', flash=this.flashTimer>0, stunned=this.stunTimer>0;
    const t=Date.now()*0.001;

    ctx.save(); ctx.translate(this.x,this.y);

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0,this.size*.9,this.size*.8,this.size*.25,0,0,Math.PI*2); ctx.fill();

    // Stun aura
    if(stunned){
      ctx.globalAlpha=0.5+0.3*Math.sin(t*10);
      ctx.fillStyle='rgba(255,255,0,0.15)';
      ctx.beginPath(); ctx.arc(0,0,this.size*1.8,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }

    // Body
    if(!flash){ctx.shadowColor=this.color; ctx.shadowBlur=stunned?0:7;}
    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2);
    ctx.fillStyle=flash?'#ffffff':(isP?'#050e1a':'#1a0505');
    ctx.fill();
    ctx.strokeStyle=flash?'#ffffff':(stunned?'#ffee00':this.color);
    ctx.lineWidth=stunned?2:1.5;
    ctx.stroke();
    ctx.shadowBlur=0;

    // Icon
    ctx.font=`${this.size*1.2}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(UNIT_DEFS[this.typeId].icon,0,0.5);

    // State dot (pulsing for attack)
    const dotColor=this.state==='garrison'?'#00ff88':this.state==='attack'?'#ff3344':'#ffe040';
    const dotPulse=this.state==='attack'?0.6+0.4*Math.sin(t*5):1;
    ctx.globalAlpha=dotPulse;
    ctx.fillStyle=dotColor; ctx.shadowColor=dotColor; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(this.size-1,-this.size+1,2.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // HP bar
    const bw=this.size*2.4, pct=this.hp/this.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(-bw/2,-this.size-7,bw,3,1); ctx.fill();
    const hc=pct>0.5?'#00cc44':pct>0.25?'#ffaa00':'#ff1122';
    ctx.fillStyle=hc; ctx.shadowColor=hc; ctx.shadowBlur=2;
    ctx.beginPath(); ctx.roundRect(-bw/2,-this.size-7,bw*pct,3,1); ctx.fill();
    ctx.shadowBlur=0;

    // Medic heal effect
    if(this.typeId==='medic'){
      ctx.globalAlpha=0.4*Math.max(0,Math.sin(t*2));
      ctx.strokeStyle='#ff88aa'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(0,0,this.healRange,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }

    ctx.restore();
  }
}

/* =====================================================================
   BOOT
===================================================================== */
const game = new Game();
</script>
